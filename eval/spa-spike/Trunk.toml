# Trunk is the Leptos-CSR bundler (wasm-bindgen + asset pipeline). `trunk serve`
# is the dev loop; `trunk build --release` emits the static dist/ that both the
# browser client and the Tauri shell (frontendDist) serve.
[build]
target = "index.html"
dist = "dist"

[serve]
# Same-origin dev server; in the real deploy the daemon serves dist/ behind the
# transport guard, so the SPA and the actions edge share an origin.
port = 8080

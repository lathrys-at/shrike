<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Shrike — SPA stack spike (#506)</title>
    <!--
      Content-Security-Policy note (the load-bearing card-frame detail):
      the sandboxed card iframe is created with `sandbox="allow-scripts"` and
      NOT `allow-same-origin`, so Anki card JS/MathJax runs but the frame is
      assigned a unique opaque origin and cannot reach the host. Under Tauri v2
      this same policy is expressed in tauri.conf.json's `security.csp`.
    -->
    <link data-trunk rel="rust" data-wasm-opt="z" />
    <style>
      body { font-family: system-ui, sans-serif; margin: 0; color: #1a1a1a; }
      nav { display: flex; gap: 1rem; padding: 0.75rem 1rem; border-bottom: 1px solid #ddd; }
      nav a { text-decoration: none; color: #0366d6; }
      main { padding: 1rem; }
      .row { padding: 0.4rem 0; border-bottom: 1px solid #eee; cursor: pointer; }
      .matrix td { padding: 0.2rem 0.8rem; }
      .ok { color: #1a7f37; } .no { color: #cf222e; }
      iframe.card { width: 100%; height: 240px; border: 1px solid #ccc; }
    </style>
  </head>
  <body></body>
</html>

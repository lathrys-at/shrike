# The Tauri v2 desktop shell. Host-target crate (NOT wasm): it owns the window,
# tray, dialogs, and the daemon lifecycle, and serves the pre-built SPA dist/ as
# its `frontendDist`. It does not link the Leptos crate — desktop is a PACKAGING
# of the same server build + a webview around the same bundle the browser gets
# (distribution.md profile 2).
[package]
name = "spa-spike-shell"
version = "0.0.0"
edition = "2021"
publish = false
license = "AGPL-3.0"
description = "Tauri v2 shell for the #506 SPA spike."

[build-dependencies]
tauri-build = { version = "2", features = [] }

[dependencies]
tauri = { version = "2", features = ["tray-icon"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"

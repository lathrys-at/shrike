name: Warm CI caches

# Populates main's actions/cache scope with the Bazel build graph (#244/#262) so a
# PR's first Bazel run restores it instead of building cold: the Rust toolchain +
# compiled crates + Python action results, AND the embedding externals (the pinned
# llama-server + the GGUF/ONNX/CLIP models, fetched + checksum-verified into the
# repository cache by building the embedding halves). A cache is only
# restorable from the current branch or the default branch; the test workflow runs
# on PRs only, so without this nothing ever seeds main's scope and every PR misses
# (#93). Cutting over the test lanes to Bazel (#262) retired the old pip llama-server
# + HuggingFace model warmer — those externals now ride the Bazel repository cache.
#
# Since #319 this also warms the LINT lane's Rust cache (the cargo/clippy
# dependency build under Swatinem/rust-cache's `rust-lint` shared key) — the
# lint lane compiles the native workspace with cargo, not Bazel, so it needs
# its own warmed entry in main's scope.
#
# Runs on the default branch every morning (6am Pacific — twice-weekly let
# entries go stale or get evicted between runs; a daily warm is one cheap
# incremental linux build), on demand via workflow_dispatch, AND on a merge to
# main that
# changes the DEPENDENCY CONE (#319): the lock/pin files only, deliberately not
# `shrike-core/**`. Every cache here is keyed on the locks, so a source-only merge
# (the common single-commit PR) invalidates nothing — the next PR still restores
# the same warmed dependency entries and only rebuilds the workspace crates
# themselves, which is the normal cheap incremental cost. Only a lock change
# leaves followers cold, so only a lock change triggers a re-warm; toolchain
# drift without a lock change (a runner-image rustc bump rotating rust-cache
# keys) is covered by the schedule.
on:
  schedule:
    - cron: "0 13 * * *" # daily, 13:00 UTC = 6am PDT (5am PST in winter)
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "shrike-core/Cargo.lock"
      - "MODULE.bazel"
      - "MODULE.bazel.lock"
      - "requirements_lock.txt"
      - ".bazelversion"
      - "tools/bazel.lock"
      - ".github/workflows/warm-cache.yml"

permissions:
  contents: read
  # actions: write so the prune-disk-cache job can delete superseded
  # bazel-disk-* entries via `gh cache delete` (#645).
  actions: write

# A merge burst (a PR stack landing) queues several warms; only the newest
# matters — each warm is a superset built from the latest main. Cancel the
# in-flight one rather than running the backlog serially.
concurrency:
  group: warm-cache-main
  cancel-in-progress: true

jobs:
  warm-bazel:
    name: Warm Bazel cache (linux)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      # The same composite as every Bazel lane, so PRs restore exactly what this
      # saves. The disk cache is content-addressed, so crates compiled here are
      # cache hits for any PR with the same Cargo.lock + toolchain — the
      # cross-PR win a per-branch cache can't give (every PR can read the
      # default branch's scope, but not a sibling PR's). Linux x64 only: it
      # mirrors the per-PR tests lane; the rc cross-platform lane (arm64/macOS)
      # is rare and warms on its own.
      - uses: ./.github/actions/bazel-setup
      # `test`, not `build` (#422): the disk cache holds TEST RESULTS too, and
      # the per-PR lane runs the whole graph unconditionally — seeding main's
      # scope with passing test results is what makes an untouched target on a
      # PR a "(cached) PASSED" skip instead of a re-run. That includes the
      # embedding halves: they're `manual` (excluded from //... to protect the
      # local dev loop), so they're named explicitly — which fetches the model
      # + llama-server externals into the repository cache AND runs the
      # embedding suites so their results are warm like everything else's.
      # This also makes the warmer a daily green/red signal for main itself;
      # --keep_going so one failure still warms everything else.
      - name: Warm the Bazel graph (build + test results + embedding externals)
        run: |
          ./bazel test --keep_going \
            -- //... //shrike-py/tests/integration:embedding_core //shrike-py/tests/integration:embedding_backends
      # THE point of #438: a flake-red warm must still seed main's scope, or
      # every PR pays a cold build until a warm happens to go green.
      - uses: ./.github/actions/bazel-save
        if: always()

  # The lint lane's Rust cache (#319): the SAME rust-cache shared-key and the
  # SAME clippy command as test.yml's lint job, run on main so the saved entry
  # lands in the default branch's scope — the only scope every PR can restore
  # from. rust-cache saves ~/.cargo (registry + git, i.e. the crate downloads)
  # and a dependency-pruned shrike-core/target keyed on Cargo.lock + toolchain, so a
  # PR's clippy step restores the compiled dependency cone and only builds the
  # workspace crates themselves.
  warm-rust-lint:
    name: Warm Rust lint cache (linux)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/rust-setup
        with:
          shared-key: rust-lint
      - name: Clippy (warms the dependency build)
        env:
          DESCRIPTORS_BIN: ${{ github.workspace }}/shrike-core/third_party/anki/anki_descriptors.bin
        run: cd shrike-core && cargo clippy --workspace --all-targets -- -D warnings

  # The coverage lane's Rust cache (#422): coverage.yml builds the native
  # extension with a debug `cargo build -p shrike-pyo3` under the `rust-coverage`
  # shared-key. Its scheduled runs (Mon/Wed/Fri, on main) self-seed that key —
  # but a Cargo.lock bump merged between schedules would leave the next
  # coverage run (or an rc PR's) cold. This job runs the same build on the same
  # triggers as the other warms, so the coverage cache turns over with the
  # locks like everything else.
  warm-rust-coverage:
    name: Warm Rust coverage cache (linux)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/rust-setup
        with:
          shared-key: rust-coverage
      - name: Build shrike-pyo3 (warms the dependency build)
        env:
          DESCRIPTORS_BIN: ${{ github.workspace }}/shrike-core/third_party/anki/anki_descriptors.bin
        run: cd shrike-core && cargo build -p shrike-pyo3

  # Prune superseded bazel-disk-* entries (#645). The disk cache is keyed on the
  # run id (a fresh ~0.5 GB superset every run, by design — it must accumulate
  # so an unchanged test replays as a hit), so without a cap the entries pile up
  # and, against the 10 GB per-repo budget, evict each other.
  #
  # PRUNE PER CACHE-SCOPE, NOT GLOBALLY (#645 durability fix). The ONLY bazel-disk
  # a PR can restore is the main-scoped one for its own os/arch (a run reads its
  # own ref + base + default branch, never a sibling PR's ref — so PR-ref disks
  # are unreadable by any other PR and by this warmer). The original prune sorted
  # ALL bazel-disk-* entries globally by createdAt and kept the newest KEEP — but
  # PR lanes save a disk on their OWN ref every run (far more often than the
  # daily warmer), so the global newest-KEEP filled with PR-ref entries and the
  # warmer's main-scoped seed (older by createdAt) fell into the delete tail.
  # That deleted the one entry PRs actually restore, in the same cycle the
  # over-budget warmer failed to save a replacement — turning a transient save
  # failure into a durable cold-build state (every PR then rebuilt the whole Rust
  # cone). A failed save is non-destructive; it was the prune that lost the seed.
  #
  # So: keep the newest KEEP entries WITHIN EACH SCOPE independently, where a
  # scope is (main-vs-not, os/arch). The os/arch axis matters because the
  # cross-platform lane saves bazel-disk-<os>-<arch>-<run> under PR refs for its
  # own arm64/macOS keys, which the linux-x64 warmer never seeds — without it,
  # linux-x64 PR-ref churn would evict an rc PR's macOS/arm64 disk. So we keep:
  # the newest KEEP main-scoped disks PER os/arch (the seed every PR restores,
  # never evicted by PR churn) AND the newest KEEP non-main disks PER os/arch
  # (bounds PR-ref accumulation per platform). This also makes the job safe under
  # a FAILED warm save: with no new main entry minted this run, the newest
  # main-scoped disk is the prior one, which is kept (`needs: warm-bazel` + `if:
  # always()` still runs it, but it can no longer delete the seed). Deletes are
  # scoped to this repo's own caches; the bazel-repo/bazel-models entries are
  # key-stable (one per pin/lock) and left untouched.
  prune-disk-cache:
    name: Prune superseded bazel-disk caches
    needs: warm-bazel
    if: always()
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}
      KEEP: "2"
    steps:
      - name: Delete all but the newest bazel-disk-* entries per scope
        run: |
          set -euo pipefail
          # Group bazel-disk-* by scope = (main-vs-not, os/arch from the key's
          # bazel-disk-<os>-<arch>- prefix), sort each newest-first by createdAt,
          # and emit the ids beyond the newest $KEEP IN EACH group. The
          # main-scoped seed is pruned only against same-scope entries, so
          # frequent PR-ref saves can never evict it (the #645 ref-blind bug),
          # and linux-x64 PR churn can't evict an rc PR's macOS/arm64 disk.
          mapfile -t stale < <(
            gh cache list --repo "$GITHUB_REPOSITORY" --limit 100 \
              --json key,id,createdAt,ref \
              --jq "[.[] | select(.key | startswith(\"bazel-disk-\"))]
                    | group_by([(.ref == \"refs/heads/main\"), (.key | split(\"-\") | .[2:4] | join(\"-\"))])
                    | map(sort_by(.createdAt) | reverse | .[($KEEP | tonumber):])
                    | add // []
                    | .[].id"
          )
          if [ "${#stale[@]}" -eq 0 ]; then
            echo "No superseded bazel-disk caches to prune."
            exit 0
          fi
          for id in "${stale[@]}"; do
            echo "Deleting superseded bazel-disk cache id=$id"
            gh cache delete "$id" --repo "$GITHUB_REPOSITORY" || true
          done

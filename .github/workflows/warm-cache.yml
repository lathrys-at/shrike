name: Warm CI caches

# Populates main's actions/cache scope with the Bazel build graph (#244/#262) so a
# PR's first Bazel run restores it instead of building cold: the Rust toolchain +
# compiled crates + Python action results, AND the embedding externals (the pinned
# llama-server + the GGUF/ONNX/CLIP models, fetched + checksum-verified into the
# repository cache by building the embedding halves). A cache is only
# restorable from the current branch or the default branch; the test workflow runs
# on PRs only, so without this nothing ever seeds main's scope and every PR misses
# (#93). Cutting over the test lanes to Bazel (#262) retired the old pip llama-server
# + HuggingFace model warmer — those externals now ride the Bazel repository cache.
#
# Since #319 this also warms the LINT lane's Rust cache (the cargo/clippy
# dependency build under Swatinem/rust-cache's `rust-lint` shared key) — the
# lint lane compiles the native workspace with cargo, not Bazel, so it needs
# its own warmed entry in main's scope.
#
# Runs on the default branch every morning (6am Pacific — twice-weekly let
# entries go stale or get evicted between runs; a daily warm is one cheap
# incremental linux build), on demand via workflow_dispatch, AND on a merge to
# main that
# changes the DEPENDENCY CONE (#319): the lock/pin files only, deliberately not
# `native/**`. Every cache here is keyed on the locks, so a source-only merge
# (the common single-commit PR) invalidates nothing — the next PR still restores
# the same warmed dependency entries and only rebuilds the workspace crates
# themselves, which is the normal cheap incremental cost. Only a lock change
# leaves followers cold, so only a lock change triggers a re-warm; toolchain
# drift without a lock change (a runner-image rustc bump rotating rust-cache
# keys) is covered by the schedule.
on:
  schedule:
    - cron: "0 13 * * *" # daily, 13:00 UTC = 6am PDT (5am PST in winter)
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "native/Cargo.lock"
      - "MODULE.bazel"
      - "MODULE.bazel.lock"
      - "requirements_lock.txt"
      - ".bazelversion"
      - "tools/bazel.lock"
      - ".github/workflows/warm-cache.yml"

permissions:
  contents: read

# A merge burst (a PR stack landing) queues several warms; only the newest
# matters — each warm is a superset built from the latest main. Cancel the
# in-flight one rather than running the backlog serially.
concurrency:
  group: warm-cache-main
  cancel-in-progress: true

jobs:
  warm-bazel:
    name: Warm Bazel cache (linux)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      # The same composite as every Bazel lane, so PRs restore exactly what this
      # saves. The disk cache is content-addressed, so crates compiled here are
      # cache hits for any PR with the same Cargo.lock + toolchain — the
      # cross-PR win a per-branch cache can't give (every PR can read the
      # default branch's scope, but not a sibling PR's). Linux x64 only: it
      # mirrors the per-PR tests lane; the rc cross-platform lane (arm64/macOS)
      # is rare and warms on its own.
      - uses: ./.github/actions/bazel-setup
      # `test`, not `build` (#422): the disk cache holds TEST RESULTS too, and
      # the per-PR lane runs the whole graph unconditionally — seeding main's
      # scope with passing test results is what makes an untouched target on a
      # PR a "(cached) PASSED" skip instead of a re-run. That includes the
      # embedding halves: they're `manual` (excluded from //... to protect the
      # local dev loop), so they're named explicitly — which fetches the model
      # + llama-server externals into the repository cache AND runs the
      # embedding suites so their results are warm like everything else's.
      # This also makes the warmer a daily green/red signal for main itself;
      # --keep_going so one failure still warms everything else.
      - name: Warm the Bazel graph (build + test results + embedding externals)
        run: |
          ./bazel test --keep_going \
            -- //... //tests/integration:embedding_core //tests/integration:embedding_backends

  # The lint lane's Rust cache (#319): the SAME rust-cache shared-key and the
  # SAME clippy command as test.yml's lint job, run on main so the saved entry
  # lands in the default branch's scope — the only scope every PR can restore
  # from. rust-cache saves ~/.cargo (registry + git, i.e. the crate downloads)
  # and a dependency-pruned native/target keyed on Cargo.lock + toolchain, so a
  # PR's clippy step restores the compiled dependency cone and only builds the
  # workspace crates themselves.
  warm-rust-lint:
    name: Warm Rust lint cache (linux)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/rust-setup
        with:
          shared-key: rust-lint
      - name: Clippy (warms the dependency build)
        env:
          DESCRIPTORS_BIN: ${{ github.workspace }}/native/third_party/anki/anki_descriptors.bin
        run: cd native && cargo clippy --workspace --all-targets -- -D warnings

  # The coverage lane's Rust cache (#422): coverage.yml builds the native
  # extension with a debug `cargo build -p shrike-py` under the `rust-coverage`
  # shared-key. Its scheduled runs (Mon/Wed/Fri, on main) self-seed that key —
  # but a Cargo.lock bump merged between schedules would leave the next
  # coverage run (or an rc PR's) cold. This job runs the same build on the same
  # triggers as the other warms, so the coverage cache turns over with the
  # locks like everything else.
  warm-rust-coverage:
    name: Warm Rust coverage cache (linux)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/rust-setup
        with:
          shared-key: rust-coverage
      - name: Build shrike-py (warms the dependency build)
        env:
          DESCRIPTORS_BIN: ${{ github.workspace }}/native/third_party/anki/anki_descriptors.bin
        run: cd native && cargo build -p shrike-py

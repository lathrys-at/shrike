name: Coverage

# Coverage lives entirely here, OFF the per-PR critical path, and is **never a gate** —
# it reports a number, it never fails a build on a threshold. Three entry points:
#
#   - push (main): every merge to main runs coverage on the freshly-merged tree and
#     publishes the README badge to the `badges` branch. Shrike is squash-merge
#     trunk-based, so a push to main IS a PR landing — this keeps the number current as
#     work lands, without running on every in-PR commit (PRs validate via test.yml;
#     coverage is not a gate, so paying a tracer + native build per PR push buys nothing).
#   - pull_request (rc-labelled only): a release candidate carries a fresh coverage
#     report before it merges, refreshed on each push to the PR. The coverage job's `if`
#     skips every non-rc PR, so an ordinary PR pays nothing and never runs it on an
#     in-PR commit.
#   - workflow_dispatch: a one-off run whenever you want the current number / to (re)seed
#     the badge.
#
# The measured command matches the tests' scope (-m "not embedding") and
# `scripts/coverage.sh`, so the numbers are comparable. The fail_under in pyproject is
# a target enforced only by that local script — never here.
on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, labeled]
  push:
    branches: [main]
  workflow_dispatch:

# Cancel an rc PR's in-flight coverage run when it gets a new push; a merge burst on
# main likewise keeps only the newest run, since each is a superset of the prior tree
# (linear squash history). Grouped by the ref — refs/pull/<n>/merge per PR,
# refs/heads/main for a push or a main-dispatched manual run — so PRs and main never
# cancel each other.
concurrency:
  group: coverage-${{ github.ref }}
  cancel-in-progress: true

jobs:
  coverage:
    name: Measure coverage
    # Skip on non-rc PRs; always run on push to main / manual dispatch.
    if: github.event_name != 'pull_request' || contains(github.event.pull_request.labels.*.name, 'rc')
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      # The harness pyproject carrying [tool.coverage.*] (branch = true) lives under
      # shrike-py/, NOT the repo-root cwd — and coverage.py only discovers config from
      # cwd. Without this the foreground `coverage run`/`combine`/`report` find no config
      # and default to *statement* coverage, while the spawned servers read the same file
      # via COVERAGE_PROCESS_START and record *branch* coverage; `coverage combine` then
      # refuses to merge branch + statement data. Point every coverage subcommand at the
      # one config so the whole run is branch-mode and the number matches scripts/
      # coverage.sh. (COVERAGE_PROCESS_START stays scoped to the pytest step so the other
      # steps' Python calls don't spuriously start a tracer.)
      COVERAGE_RCFILE: ${{ github.workspace }}/shrike-py/pyproject.toml
    outputs:
      pct: ${{ steps.fields.outputs.pct }}
      color: ${{ steps.fields.outputs.color }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0 # full history + tags so hatch-vcs can derive the version at install
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      # Exact tag: setup-uv v8+ publishes no moving major tag (immutable
      # releases) — `@v8` does not resolve, so pin the full version.
      - uses: astral-sh/setup-uv@v8.2.0
        with:
          enable-cache: true
          cache-dependency-glob: shrike-py/pyproject.toml
      - name: Install dependencies
        # pyproject.toml lives in the shrike-py/ unit (#731).
        run: uv pip install --system -e "shrike-py/[dev]"
      # The native extension (#400): since the cutover `shrike.collection` does
      # `import shrike_native`, which a plain pip install doesn't build — without
      # this step every run died at test collection (ModuleNotFoundError), so the
      # whole lane was a 17-second no-op. The rust-setup composite carries the
      # rust-cache + protoc preamble; `rust-coverage` is this lane's own
      # shared-key (a debug `cargo build`, not clippy's check artifacts),
      # seeded on main by the push-to-main runs here and by warm-cache.yml's
      # warm-rust-coverage on lock bumps (#422).
      - uses: ./.github/actions/rust-setup
        with:
          shared-key: rust-coverage
      # DESCRIPTORS_BIN: same reason as the lint lane — rust-cache prunes the
      # shared target dir the anki build scripts would otherwise hand the
      # descriptor set through; the checked-in pin keeps the build hermetic.
      - name: Build native extension
        env:
          DESCRIPTORS_BIN: ${{ github.workspace }}/shrike-core/third_party/anki/anki_descriptors.bin
        run: scripts/build-native.sh
      - name: Enable subprocess coverage
        # The integration suite runs the server as a `python -m shrike.server`
        # subprocess; this .pth (guarded on COVERAGE_PROCESS_START) makes each
        # subprocess start coverage too, so `coverage combine` captures the server.
        run: |
          SITE=$(python -c 'import site; print(site.getsitepackages()[0])')
          echo 'import os; os.getenv("COVERAGE_PROCESS_START") and __import__("coverage").process_startup()' > "$SITE/coverage_subprocess.pth"
      # One combined `-n auto` run over both suites (xdist balances them); the .pth
      # hook fires for each worker and each spawned server, so combine merges to one
      # total. Kept identical to scripts/coverage.sh.
      - name: Run unit + integration under coverage
        env:
          COVERAGE_PROCESS_START: ${{ github.workspace }}/shrike-py/pyproject.toml
          # tests/conftest.py's native-staleness backstop reads a per-venv stamp
          # build-native.sh writes only under VIRTUAL_ENV; this lane installs with
          # `uv pip install --system` (no venv), so no stamp exists and the check
          # would abort even though the step above just built the extension fresh.
          # Skip it — the documented bypass the Bazel lane uses, for the same
          # reason: the build is freshly produced here, not a stale dev leftover.
          SHRIKE_SKIP_NATIVE_STALE_CHECK: "1"
        run: coverage run --parallel-mode -m pytest shrike-py/tests/unit shrike-py/tests/integration shrike-py/tests/native -q -m "not embedding" -n auto
      - name: Combine
        run: coverage combine
      # Surface the number in the run summary. `--fail-under=0` prints the table but
      # never exits non-zero — this workflow reports, it does not gate.
      - name: Report to summary
        run: |
          {
            echo '### Coverage'
            echo ''
            echo '```'
            coverage report --fail-under=0
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
      # Total % + a shields colour, exposed as job outputs for the badge job.
      - name: Compute badge fields
        id: fields
        run: |
          # --fail-under=0 like the report step: `coverage json` otherwise
          # enforces pyproject's fail_under and gates the run (#418).
          coverage json -q --fail-under=0  # writes coverage.json
          PCT=$(python -c "import json; print(json.load(open('coverage.json'))['totals']['percent_covered_display'])")
          if   [ "$PCT" -ge 90 ]; then COLOR=brightgreen
          elif [ "$PCT" -ge 80 ]; then COLOR=green
          elif [ "$PCT" -ge 70 ]; then COLOR=yellowgreen
          elif [ "$PCT" -ge 60 ]; then COLOR=yellow
          else                        COLOR=red
          fi
          echo "pct=$PCT" >> "$GITHUB_OUTPUT"
          echo "color=$COLOR" >> "$GITHUB_OUTPUT"
          echo "coverage: ${PCT}% (${COLOR})"
      # Leave a browsable line-by-line report so keeping coverage healthy is easy.
      # --fail-under=0 like every other invocation here: `coverage html` also
      # enforces pyproject's fail_under, and a below-target main run must report
      # (and publish the badge), never fail (#421 — exit 2 at 85% failed the whole
      # workflow and skipped the badge).
      - name: Build HTML report
        run: coverage html --fail-under=0
      - name: Upload HTML report
        uses: actions/upload-artifact@v7
        with:
          name: coverage-html
          path: htmlcov/
          retention-days: 14

  # Rust coverage (#748): cargo-llvm-cov over the shrike-core workspace, same
  # off-gate posture and triggers as the Python job above — reports a table to the
  # run summary, never fails on a threshold. Independent of the badge job (the badge
  # tracks the Python number). Linux only (the cargo lanes are; macOS builds Rust
  # through Bazel). cargo-llvm-cov is NOT Bazel coverage — see the coverage ADR.
  coverage-rust:
    name: Measure Rust coverage
    if: github.event_name != 'pull_request' || contains(github.event.pull_request.labels.*.name, 'rc')
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0 # full history + tags so hatch-vcs / anki version derivation works
      - uses: ./.github/actions/rust-setup
        with:
          shared-key: rust-coverage
      - name: Install llvm-tools + cargo-llvm-cov
        run: rustup component add llvm-tools-preview
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-llvm-cov
      # DESCRIPTORS_BIN: the anki build scripts run during the instrumented compile
      # and need the checked-in pinned descriptor set (rust-cache prunes the shared
      # target dir cargo would otherwise hand it through) — same reason as the lint
      # and Python-coverage lanes.
      - name: Measure + report Rust coverage
        env:
          DESCRIPTORS_BIN: ${{ github.workspace }}/shrike-core/third_party/anki/anki_descriptors.bin
        run: |
          {
            echo '### Rust coverage (cargo-llvm-cov, line + region)'
            echo ''
            echo '```'
            scripts/coverage-rust.sh
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

  # Publish the README badge (a shields-endpoint JSON on the orphan `badges` branch).
  # ONLY the main-scoped runs do this — a merge to main or a manual dispatch, never a
  # PR (an rc PR reports its number, it doesn't move main's badge), which the `if`
  # enforces. Force-pushes a single-commit orphan so the branch never grows.
  badge:
    name: Publish coverage badge
    needs: coverage
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Write shields endpoint JSON to the `badges` branch
        env:
          PCT: ${{ needs.coverage.outputs.pct }}
          COLOR: ${{ needs.coverage.outputs.color }}
          REPO: ${{ github.repository }}
          TOKEN: ${{ github.token }}
        run: |
          tmp=$(mktemp -d) && cd "$tmp"
          git init -q
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          printf '{"schemaVersion":1,"label":"coverage","message":"%s%%","color":"%s"}\n' "$PCT" "$COLOR" > coverage.json
          git checkout -q --orphan badges
          git add coverage.json
          git commit -q -m "coverage: ${PCT}% [skip ci]"
          git push -q -f "https://x-access-token:${TOKEN}@github.com/${REPO}.git" badges
          echo "Published coverage badge: ${PCT}% (${COLOR})"

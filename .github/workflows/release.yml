name: Release

# Tag-triggered release. The expensive cross-platform lanes that plain PRs skip
# (they only run on `rc`-labelled PRs — see test.yml) run here unconditionally:
# tagging a release is exactly the moment to pay for full coverage. On a `v*` tag
# push we run the full integration suite on every platform, build the artifacts
# with Bazel (the platform-tagged Python wheels + sdist, the anki-cards.skill
# bundle, and SHA256SUMS), and cut a GitHub Release with them attached.
#
# Pre-release tags (`vX.Y.Z-rc.N`, `-alpha`, …) are marked as GitHub pre-releases.
# Final releases are also published to PyPI via trusted publishing (the
# `publish-pypi` job below, #43); pre-release tags skip that job.
on:
  push:
    tags:
      - "v*"

# `contents: write` is required to create the Release and upload its assets.
permissions:
  contents: write

jobs:
  # The full Bazel graph + the embedding halves on every supported platform.
  # This is the cross-platform job from test.yml run unconditionally instead of
  # gated on the `rc` label (plus linux x64, which the per-PR lanes cover) — a
  # release must be green everywhere before we build or publish. Harmonized
  # onto Bazel in #422: the old pip-lane job here (pip install +
  # install-llama-server.sh + pytest) stopped producing a working
  # `shrike_native` at the native cutover and would have died at test
  # collection on the next tag; the Bazel graph builds the extension and pins
  # the model/llama-server externals (no HuggingFace fetch on release day).
  test:
    name: Full suite (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, ubuntu-24.04-arm, macos-latest]
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/bazel-setup
      - name: Run the test graph
        run: |
          ./bazel test \
            -- //... //tests/integration:embedding_core //tests/integration:embedding_backends
      - uses: ./.github/actions/bazel-save
        if: always()

  # The platform-tagged shrike-mcp wheels (#497): cp312-abi3 with the native
  # extension inside, one per supported platform. The linux pair builds on
  # ubuntu-22.04 deliberately — auditwheel grades the manylinux tag by the
  # glibc symbols the extension links, so the oldest supported runner gives the
  # widest-installing tag (manylinux_2_35 at most). macOS x86_64 rides the
  # macos-15-intel runner (the last hosted Intel image; macos-13 retired
  # 2025-12). Neither extra runner is warmed by warm-cache.yml (it only runs
  # the test.yml matrix), so those two legs cold-compile the Rust workspace at
  # tag time — accepted: it's release cadence, not the PR loop.
  build-wheels:
    name: Build wheel (${{ matrix.os }})
    needs: test
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-22.04, ubuntu-22.04-arm, macos-latest, macos-15-intel]
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0  # tags so the Bazel version stamp (git describe) resolves
      - uses: ./.github/actions/bazel-setup
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"  # for auditwheel/twine only; Bazel uses its own toolchain
      - name: Build the platform wheel with Bazel
        # The committed ./bazel wrapper fetches the pinned Bazel; the wrapper
        # script stamps the tag-derived version in and renames to the real
        # shrike_mcp-<version>-cp312-abi3-<platform>.whl filename under dist/.
        run: tools/build-wheel.sh
      - name: Repair the linux wheel to a manylinux tag (auditwheel)
        # py_wheel emits plain linux_* platform tags, which PyPI rejects;
        # auditwheel grades the extension's glibc usage, vendors any linked
        # non-allowlisted libraries, and re-tags to the manylinux policy the
        # wheel actually satisfies. (The ort runtime is dlopen'd from the
        # onnxruntime wheel at runtime — load-dynamic — so it is never a
        # link-time dependency to vendor.)
        if: runner.os == 'Linux'
        run: |
          pip install auditwheel patchelf
          built=(dist/*.whl)
          auditwheel repair "${built[0]}" --wheel-dir dist/repaired
          rm "${built[0]}"
          mv dist/repaired/*.whl dist/
          rmdir dist/repaired
      - name: Validate metadata
        run: |
          pip install twine
          twine check dist/*.whl
      - name: Sanity-check built version matches the tag
        # Defence-in-depth against a broken build producing a dev version (e.g. tags
        # not fetched, so the Bazel version stamp falls back). Skipped for
        # pre-releases: PEP 440 normalises the tag (v1.2.3-rc.1 -> 1.2.3rc1), so a
        # literal tag↔filename match wouldn't hold.
        run: |
          version="${GITHUB_REF_NAME#v}"
          if [[ "$version" != *-* ]]; then
            if ! ls dist/shrike_mcp-"${version}"-*.whl >/dev/null 2>&1; then
              echo "::error::built wheel doesn't match tag ${GITHUB_REF_NAME}: $(ls dist)"
              exit 1
            fi
          fi
      - uses: ./.github/actions/bazel-save
        if: always()
      - uses: actions/upload-artifact@v7
        with:
          name: dist-wheel-${{ matrix.os }}
          path: dist/*.whl

  # The sdist + the anki-cards.skill bundle, all via Bazel (#245). Each is
  # stamped from the tag (STABLE_VERSION via tools/workspace_status.sh, hence
  # fetch-depth: 0). They go into a dist-* artifact for the release job to
  # attach + checksum alongside the wheels.
  build-sdist:
    name: Build sdist + skill
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0  # tags so the Bazel version stamp (git describe) resolves
      # The same warmed caches as every other Bazel lane (#422) — without them
      # this job cold-compiled the whole Rust workspace at tag time.
      - uses: ./.github/actions/bazel-setup
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"  # for `twine check` only; Bazel uses its own toolchain
      - name: Build the sdist with Bazel
        run: tools/build-sdist.sh
      - name: Validate metadata
        run: |
          pip install twine
          twine check dist/*
      - name: Sanity-check built version matches the tag
        # Same defence as the wheel jobs, against the sdist filename.
        run: |
          version="${GITHUB_REF_NAME#v}"
          if [[ "$version" != *-* ]]; then
            if ! ls "dist/shrike_mcp-${version}.tar.gz" >/dev/null 2>&1; then
              echo "::error::built artifacts don't match tag ${GITHUB_REF_NAME}: $(ls dist)"
              exit 1
            fi
          fi
      # Built after `twine check` so the check only ever saw the Python dists.
      - name: Package the anki-cards skill bundle with Bazel
        run: |
          ./bazel build //skills:skill --stamp
          cp -f "$(./bazel cquery --output=files //skills:skill)" dist/anki-cards.skill
      - uses: ./.github/actions/bazel-save
        if: always()
      - uses: actions/upload-artifact@v7
        with:
          name: dist-sdist
          path: dist/*

  # Create the GitHub Release and attach the artifacts. Notes come from the
  # matching CHANGELOG section for a final release; pre-releases (and a final tag
  # whose section is missing) fall back to auto-generated commit notes.
  release:
    name: Create GitHub Release
    needs: [build-wheels, build-sdist]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6  # for CHANGELOG.md at the tagged commit
      - uses: actions/download-artifact@v8
        with:
          pattern: dist-*
          merge-multiple: true
          path: dist
      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          tag="$GITHUB_REF_NAME"
          version="${tag#v}"

          # A SemVer pre-release identifier (the hyphen in v1.2.3-rc.1) marks this
          # as a GitHub pre-release.
          prerelease=""
          [[ "$version" == *-* ]] && prerelease="--prerelease"

          # Curated notes: the section under "## [VERSION]" in CHANGELOG.md, up to
          # the next "## " heading. Literal-prefix match (index == 1) so dots in
          # the version need no regex escaping. Pre-releases skip this — their
          # section usually doesn't exist yet (still under Unreleased).
          notes="--generate-notes"
          if [[ -z "$prerelease" ]]; then
            awk -v hdr="## [$version]" '
              index($0, hdr) == 1 { capture = 1; next }
              capture && /^## / { exit }
              capture { print }
            ' CHANGELOG.md > notes.md
            # Drop the blank line that follows the heading; use the file only if
            # it has real content.
            sed -i -e '/./,$!d' notes.md
            [[ -s notes.md ]] && notes="--notes-file notes.md"
          fi

          # Checksums for verifiable downloads. The explicit globs can't match
          # SHA256SUMS itself, so it never hashes its own (partial) contents.
          ( cd dist && sha256sum -- *.whl *.tar.gz *.skill > SHA256SUMS )

          gh release create "$tag" dist/* --title "$tag" $prerelease $notes

  # Publish the Python package to PyPI on a final release, via trusted publishing
  # (OIDC, no API token). Skipped for pre-release (rc) tags. Requires a trusted
  # publisher configured on PyPI for `shrike-mcp`, pointing at this repo, this
  # workflow file, and the `pypi` environment.
  publish-pypi:
    name: Publish to PyPI
    needs: [build-wheels, build-sdist]
    # Final releases only — a pre-release (rc) tag carries a SemVer hyphen.
    if: ${{ !contains(github.ref_name, '-') }}
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write  # mint the OIDC token PyPI trusted publishing verifies
    steps:
      - uses: actions/download-artifact@v8
        with:
          pattern: dist-*
          merge-multiple: true
          path: dist
      - name: Keep only the Python distributions
        # The dist artifacts also carry anki-cards.skill; PyPI must receive only
        # the sdist + the platform wheels.
        run: find dist -maxdepth 1 -type f ! -name '*.whl' ! -name '*.tar.gz' -delete
      - uses: pypa/gh-action-pypi-publish@release/v1

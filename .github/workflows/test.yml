name: Tests

on:
  # PRs only. `main` is reached exclusively through PRs (squash merge), so a
  # push-to-main trigger would just re-run what the PR already validated — pure
  # redundant spend. `labeled` is included so applying the `rc` label re-triggers
  # CI (the default types don't fire on label changes); it gates the expensive
  # cross-platform job.
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, labeled]

jobs:
  lint:
    name: Lint & type check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml
      - name: Install dependencies
        run: pip install -e ".[dev]"
      - name: Ruff check
        run: ruff check src/shrike/ tests/
      - name: Ruff format check
        run: ruff format --check src/shrike/ tests/
      - name: Mypy
        run: mypy src/shrike/

  # Unit + non-embedding integration on Linux x64, under coverage with the
  # subprocess hook (so the spawned server is counted), enforcing the gate.
  # Folds the old unit/coverage/integration-ubuntu jobs into one runner.
  test:
    name: Tests & coverage (linux)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml
      - name: Install dependencies
        run: pip install -e ".[dev]"
      - name: Enable subprocess coverage
        run: |
          SITE=$(python -c 'import site; print(site.getsitepackages()[0])')
          echo 'import coverage; coverage.process_startup()' > "$SITE/coverage_subprocess.pth"
      - name: Run unit + integration under coverage
        env:
          COVERAGE_PROCESS_START: ${{ github.workspace }}/pyproject.toml
        run: |
          coverage run --parallel-mode -m pytest tests/unit -q
          coverage run --parallel-mode -m pytest tests/integration -q -m "integration and not embedding"
      - name: Combine and report (enforces fail_under)
        run: |
          coverage combine
          coverage report

  embedding:
    name: Embedding tests (linux)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml
      - name: Install llama-server
        run: bash .github/scripts/install-llama-server.sh
      - name: Install dependencies
        run: pip install -e ".[dev]"
      - name: Run embedding tests
        env:
          LD_LIBRARY_PATH: ${{ env.LLAMA_DIR }}
        run: pytest tests/integration -v -m embedding

  # macOS + ARM are expensive (macOS bills at 10x), so they NEVER run on plain
  # PRs or on merges to main — only when a PR carries the `rc` (release
  # candidate) label. Apply the label when you're about to tag a release and want
  # full cross-platform coverage first. Each runs the full integration suite
  # (including embedding) for that platform.
  cross-platform:
    name: Cross-platform (${{ matrix.os }})
    if: contains(github.event.pull_request.labels.*.name, 'rc')
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04-arm, macos-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml
      - name: Install llama-server
        run: bash .github/scripts/install-llama-server.sh
      - name: Install dependencies
        run: pip install -e ".[dev]"
      - name: Run integration + embedding tests
        env:
          LD_LIBRARY_PATH: ${{ env.LLAMA_DIR }}
          DYLD_LIBRARY_PATH: ${{ env.LLAMA_DIR }}
        run: pytest tests/integration -v -m integration

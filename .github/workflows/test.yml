name: Tests

on:
  # PRs only. `main` is reached exclusively through PRs (squash merge), so a
  # push-to-main trigger would just re-run what the PR already validated — pure
  # redundant spend.
  #
  # CI is GATED on the `ci` label: nothing but the tiny `ci-ok` sentinel runs
  # until a PR carries `ci` (or `rc`, which implies full CI for a release
  # candidate). This defers every remote run until code review is complete, so a
  # PR that churns through review doesn't re-run the whole suite on each push —
  # the free-tier Actions budget is spent once, at the end, when you add `ci`.
  # `labeled` is in the trigger types so adding `ci`/`rc` re-fires the workflow
  # (the default types don't fire on label changes); `unlabeled` so removing the
  # label re-evaluates the `ci-ok` gate (flips it back to "add the ci label").
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, labeled, unlabeled]

# `contents: read` for checkout; `pull-requests: read` so the `changes` job's
# paths-filter can list this PR's changed files via the API (the default token
# is contents-only here, which fails with "Resource not accessible by integration").
permissions:
  contents: read
  pull-requests: read

# Cancel a PR's in-flight run when a new commit is pushed to it: every follow-up
# commit otherwise lets the older run (lint + tests) finish on a commit nobody
# will merge, burning Actions minutes. Grouped by `github.ref`
# (`refs/pull/<n>/merge`), so cancellation is scoped to the same PR — never across
# PRs. The release workflow deliberately has no such group (a tag build must run
# to completion).
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Decide which lanes need to run for this PR's diff. Docs-only changes skip
  # every test job (only `ci-ok` runs); the embedding lane (which spins up
  # llama-server) is skipped unless something that can affect embedding/search
  # changed. `changes` is cheap — checkout + a path diff. NOTE: the per-job `if`s
  # mean jobs get *skipped*, not run-and-passed, so the single required status
  # check for branch protection must be `ci-ok` (below), never the individual
  # jobs — a skipped required check blocks the merge forever.
  changes:
    name: Detect changed paths
    # The `ci`-label gate. `changes` is the root of the dependency graph
    # (lint/bazel/embedding all `needs: changes`), so skipping it here when the PR
    # lacks `ci`/`rc` cascades — every downstream lane is skipped too, and not a
    # single test runner spins up. `cross-platform` is the only lane outside this
    # graph; it stays `rc`-gated (and `rc` is part of this condition anyway).
    if: contains(github.event.pull_request.labels.*.name, 'ci') || contains(github.event.pull_request.labels.*.name, 'rc')
    runs-on: ubuntu-latest
    outputs:
      code: ${{ steps.filter.outputs.code }}
      embedding: ${{ steps.filter.outputs.embedding }}
      bazel: ${{ steps.filter.outputs.bazel }}
      native: ${{ steps.filter.outputs.native }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            code:
              - 'src/**'
              - 'tests/**'
              - 'pyproject.toml'
              - '.github/workflows/test.yml'
            bazel:
              # Anything the Bazel graph builds/tests from, plus the bootstrap.
              - 'src/**'
              - 'bin/**'
              - 'tools/**'
              - 'native/**'
              - 'MODULE.bazel'
              - 'MODULE.bazel.lock'
              - 'BUILD.bazel'
              - '**/BUILD.bazel'
              - '.bazelversion'
              - '.bazelrc'
              - 'bazel'
              - 'requirements_lock.txt'
              - '.github/workflows/test.yml'
            native:
              # The Rust/PyO3 seam (#254). The per-PR linux lane builds it only
              # when these change (otherwise it rides the rc cross-platform lane),
              # so a normal source/unit-test PR doesn't pay the Rust toolchain +
              # crate-universe cold-start. MODULE.bazel(.lock) carry the Rust
              # toolchain + crate pins; .bazelversion/tools/bazel.lock the Bazel
              # that builds it; the workflow itself defines the native step.
              - 'native/**'
              - 'MODULE.bazel'
              - 'MODULE.bazel.lock'
              - '.bazelversion'
              - 'bazel'
              - 'tools/bazel.lock'
              - '.github/workflows/test.yml'
            embedding:
              # Conservative: any source change can reach the server the
              # embedding/search tests drive, so gate on all of src/shrike plus
              # the embedding-specific tests.
              - 'src/shrike/**'
              - 'tests/integration/test_embedding.py'
              - 'tests/integration/test_semantic.py'
              - 'tests/integration/test_backends.py'
              - 'tests/integration/test_onnx_models.py'
              - 'tests/integration/test_clip_model.py'
              # Shared harness that the embedding lane depends on (model
              # download/cache, server fixtures) and the workflow itself.
              - 'tests/integration/conftest.py'
              - 'tests/integration/model_cache.py'
              - 'tests/unit/test_embedding.py'
              - 'tests/unit/test_embedding_onnx.py'
              - 'tests/unit/test_embedding_clip.py'
              - 'tests/unit/test_index.py'
              - 'tests/unit/test_note_embedding_text.py'
              - 'tests/unit/test_tools_search.py'
              # The Bazel inputs that build the embedding target: the pinned model
              # + llama-server externals (MODULE.bazel), the target definition, and
              # the bootstrap.
              - 'MODULE.bazel'
              - 'MODULE.bazel.lock'
              - 'tests/integration/BUILD.bazel'
              - '.bazelversion'
              - 'bazel'
              - 'tools/bazel.lock'
              - '.github/workflows/test.yml'
              - 'pyproject.toml'

  lint:
    name: Lint & type check
    needs: changes
    # `|| rc-label` forces this lane even on a docs-only diff the path filter
    # would skip, so a release candidate runs the full suite at the PR level
    # rather than first at the v* tag (#152).
    if: needs.changes.outputs.code == 'true' || contains(github.event.pull_request.labels.*.name, 'rc')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # full history + tags so hatch-vcs can derive the version at install
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      # uv installs deps ~3x faster than pip (parallel + hardlinked cache),
      # cutting the per-job dependency install that runs in every lane.
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: pyproject.toml
      - name: Install dependencies
        run: uv pip install --system -e ".[dev]"
      - name: Ruff check
        run: ruff check src/shrike/ tests/
      - name: Ruff format check
        run: ruff format --check src/shrike/ tests/
      - name: Mypy
        run: mypy src/shrike/
      # Rust lint (#304): the idiomatic gates for the native workspace —
      # rustfmt and clippy-as-errors. Gated on the native path filter so a
      # pure-Python PR doesn't pay for a Rust toolchain or a clippy build;
      # rc-labelled PRs run it regardless (full-suite release posture). The
      # GitHub runner ships rustup; sync to the repo's pinned toolchain default.
      - name: Rust format check
        if: needs.changes.outputs.native == 'true' || contains(github.event.pull_request.labels.*.name, 'rc')
        run: cd native && cargo fmt --check
      - name: Rust clippy
        if: needs.changes.outputs.native == 'true' || contains(github.event.pull_request.labels.*.name, 'rc')
        run: cd native && cargo clippy --workspace --all-targets -- -D warnings

  # The authoritative test lane: the unit + non-embedding integration suites run
  # under Bazel (`//... -//native/...` = the unit/integration aggregates + the
  # import spike + the library smoke; the wheel/sdist are `manual`, the embedding
  # target is `manual` + runs in its own lane below). This replaces the old pip
  # pytest lane — `bazel test` caches unchanged results, so a re-push only re-runs
  # what changed. The committed ./bazel launcher bootstraps bazelisk + Bazel; no
  # setup-python (the toolchain is hermetic).
  bazel:
    name: Bazel test (linux)
    needs: changes
    if: needs.changes.outputs.bazel == 'true' || contains(github.event.pull_request.labels.*.name, 'rc')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # Two caches, split by update cadence. The bazelisk + Bazel binaries and the
      # repository cache (downloaded wheels + the Python/Rust toolchains) change
      # only when the pins do, so key them on the locks: a pure restore otherwise,
      # never re-uploading the toolchains every run.
      - name: Cache Bazel toolchains + repo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/shrike/bazelisk
            ~/.cache/shrike/bazelisk-home
            ~/.cache/shrike/bazel-repo
          key: bazel-repo-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('MODULE.bazel.lock', 'requirements_lock.txt', '.bazelversion', 'tools/bazel.lock') }}
          restore-keys: bazel-repo-${{ runner.os }}-${{ runner.arch }}-
      # The action/test-result disk cache must ACCUMULATE so an unchanged test is
      # a cache hit (skipped, not re-run). actions/cache never updates an existing
      # key, so a lock-stable key freezes after its first save and every later run
      # re-executes everything. Suffix the save key with the run id so each run
      # writes a fresh superset; restore-keys pulls the most recent prior one.
      - name: Cache Bazel action results
        uses: actions/cache@v4
        with:
          path: ~/.cache/shrike/bazel-disk
          key: bazel-disk-${{ runner.os }}-${{ runner.arch }}-${{ github.run_id }}
          restore-keys: bazel-disk-${{ runner.os }}-${{ runner.arch }}-
      # The Python graph: the unit + non-embedding integration suites + the
      # native-dep import spike + the library smoke. The Rust/PyO3 seam is excluded
      # here and built in the next step only when it changed, so the common
      # source/unit-test PR never pays the Rust toolchain + crate-universe
      # cold-start.
      - name: Bazel test (Python graph)
        run: |
          ./bazel test \
            --disk_cache="$HOME/.cache/shrike/bazel-disk" \
            --repository_cache="$HOME/.cache/shrike/bazel-repo" \
            -- //... -//native/...
      # The Rust/PyO3 seam (#254). Off the hot path: only when the native/build
      # pins changed, or on an rc PR (mirrors the cross-platform lane's full //...).
      - name: Bazel test (native seam)
        if: needs.changes.outputs.native == 'true' || contains(github.event.pull_request.labels.*.name, 'rc')
        run: |
          ./bazel test \
            --disk_cache="$HOME/.cache/shrike/bazel-disk" \
            --repository_cache="$HOME/.cache/shrike/bazel-repo" \
            -- //native/...

  # Embedding tests under Bazel (#262). Runs the `manual` //tests/integration:embedding
  # aggregate — llama-server + the GGUF/ONNX/CLIP models are pinned, checksummed
  # Bazel externals (#244 Phase 2c), fetched into the repository cache instead of
  # cold-downloaded from HuggingFace at test time (no more #83/#93 429 flake, and
  # no llama-server install step). Restores main's warmed Bazel cache (warm-cache.yml
  # fetches the embedding externals there), so a PR run doesn't re-fetch them.
  embedding:
    name: Bazel embedding tests (linux)
    needs: changes
    if: needs.changes.outputs.embedding == 'true' || contains(github.event.pull_request.labels.*.name, 'rc')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Cache Bazel toolchains + repo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/shrike/bazelisk
            ~/.cache/shrike/bazelisk-home
            ~/.cache/shrike/bazel-repo
          key: bazel-repo-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('MODULE.bazel.lock', 'requirements_lock.txt', '.bazelversion', 'tools/bazel.lock') }}
          restore-keys: bazel-repo-${{ runner.os }}-${{ runner.arch }}-
      - name: Cache Bazel action results
        uses: actions/cache@v4
        with:
          path: ~/.cache/shrike/bazel-disk
          key: bazel-disk-${{ runner.os }}-${{ runner.arch }}-${{ github.run_id }}
          restore-keys: bazel-disk-${{ runner.os }}-${{ runner.arch }}-
      - name: Bazel test (embedding)
        run: |
          ./bazel test \
            --disk_cache="$HOME/.cache/shrike/bazel-disk" \
            --repository_cache="$HOME/.cache/shrike/bazel-repo" \
            //tests/integration:embedding

  # macOS + ARM are expensive (macOS bills at 10x), so they NEVER run on plain
  # PRs or on merges to main — only when a PR carries the `rc` (release
  # candidate) label. Apply the label when you're about to tag a release and want
  # full cross-platform coverage first. Runs the whole Bazel graph (including the
  # `manual` embedding target + the Rust/PyO3 seam) for that platform — the
  # macOS-only PyO3 link path (-undefined dynamic_lookup) + the .so rename can't
  # be reached on the per-PR linux lane (#247 review). Label-gated regardless of
  # paths: a release candidate gets full coverage no matter how small the diff.
  cross-platform:
    name: Cross-platform (${{ matrix.os }})
    if: contains(github.event.pull_request.labels.*.name, 'rc')
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04-arm, macos-latest]
    steps:
      - uses: actions/checkout@v4
      # Same split caches as the per-PR lane (different os/arch key scope, so no
      # collision): lock-keyed toolchains+repo, run-id-keyed action results so the
      # disk cache accumulates instead of freezing after its first save.
      - name: Cache Bazel toolchains + repo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/shrike/bazelisk
            ~/.cache/shrike/bazelisk-home
            ~/.cache/shrike/bazel-repo
          key: bazel-repo-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('MODULE.bazel.lock', 'requirements_lock.txt', '.bazelversion', 'tools/bazel.lock') }}
          restore-keys: bazel-repo-${{ runner.os }}-${{ runner.arch }}-
      - name: Cache Bazel action results
        uses: actions/cache@v4
        with:
          path: ~/.cache/shrike/bazel-disk
          key: bazel-disk-${{ runner.os }}-${{ runner.arch }}-${{ github.run_id }}
          restore-keys: bazel-disk-${{ runner.os }}-${{ runner.arch }}-
      # Full //... (incl. the Rust/PyO3 seam) plus the manual embedding target —
      # this lane is the cross-platform proof.
      - name: Bazel test
        run: |
          ./bazel test \
            --disk_cache="$HOME/.cache/shrike/bazel-disk" \
            --repository_cache="$HOME/.cache/shrike/bazel-repo" \
            -- //... //tests/integration:embedding

  # Single required status check. Always runs, and passes iff every gated job
  # either succeeded or was legitimately skipped (its paths didn't change / not
  # an rc PR). This is what branch protection should require — it turns the
  # conditional jobs into one stable check that never deadlocks a merge.
  ci-ok:
    name: CI passed
    if: ${{ always() }}
    # Coverage is intentionally NOT aggregated here — it lives in its own workflow
    # (coverage.yml) and only ever reports, never gates, so it must not block the merge.
    needs: [changes, lint, bazel, embedding, cross-platform]
    runs-on: ubuntu-latest
    steps:
      # Gate: CI must be opted in via the `ci` (or `rc`) label. Without it the
      # whole graph above is skipped, so this required check fails with an
      # actionable message — the PR can't merge until someone adds `ci` and the
      # suite actually runs. This is the enforcement half of the deferral: CI is
      # deferred, not skipped — it must still pass before merge.
      - name: Require the ci (or rc) label
        if: ${{ !(contains(github.event.pull_request.labels.*.name, 'ci') || contains(github.event.pull_request.labels.*.name, 'rc')) }}
        run: |
          echo "::error::CI is gated on the 'ci' label — add the 'ci' label once code review is complete to run the suite (or 'rc' for a release candidate)."
          exit 1
      - name: Verify gated jobs passed or were skipped
        run: |
          if [ "${{ needs.changes.result }}" != "success" ]; then
            echo "::error::changes job result was '${{ needs.changes.result }}'"; exit 1
          fi
          for r in \
            "lint=${{ needs.lint.result }}" \
            "bazel=${{ needs.bazel.result }}" \
            "embedding=${{ needs.embedding.result }}" \
            "cross-platform=${{ needs.cross-platform.result }}"; do
            case "${r#*=}" in
              success|skipped) echo "ok: $r" ;;
              *) echo "::error::$r"; exit 1 ;;
            esac
          done
          echo "All gated jobs passed or were skipped."

name: Tests

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  lint:
    name: Lint & type check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: pip install -e ".[dev]"
      - name: Ruff check
        run: ruff check src/shrike/ tests/
      - name: Ruff format check
        run: ruff format --check src/shrike/ tests/
      - name: Mypy
        run: mypy src/shrike/

  unit:
    name: Unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: pip install -e ".[dev]"
      - name: Run unit tests
        run: pytest tests/unit -v

  coverage:
    name: Coverage gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: pip install -e ".[dev]"
      - name: Enable subprocess coverage
        # The integration suite runs the server as a `python -m shrike.server`
        # subprocess; this .pth + COVERAGE_PROCESS_START make that process record
        # coverage too, so server.py/daemon.py aren't counted as dead.
        run: |
          SITE=$(python -c 'import site; print(site.getsitepackages()[0])')
          echo 'import coverage; coverage.process_startup()' > "$SITE/coverage_subprocess.pth"
      - name: Run unit + integration under coverage
        env:
          COVERAGE_PROCESS_START: ${{ github.workspace }}/pyproject.toml
        run: |
          coverage run --parallel-mode -m pytest tests/unit -q
          coverage run --parallel-mode -m pytest tests/integration -q -m "integration and not embedding"
      - name: Combine and report (enforces fail_under)
        run: |
          coverage combine
          coverage report

  integration:
    name: Integration tests (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, ubuntu-24.04-arm, macos-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: pip install -e ".[dev]"
      - name: Run integration tests
        run: pytest tests/integration -v -m "integration and not embedding"

  embedding:
    name: Embedding tests (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, ubuntu-24.04-arm, macos-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install llama-server
        run: |
          # Pinned tag + per-platform checksum (kept in scripts/llama-server.lock,
          # bumped via scripts/update-llama-lock.sh) — no unverified releases/latest.
          source scripts/llama-server.lock
          case "$(uname -s)-$(uname -m)" in
            Linux-x86_64)   PLATFORM="ubuntu-x64" ;;
            Linux-aarch64)  PLATFORM="ubuntu-arm64" ;;
            Darwin-arm64)   PLATFORM="macos-arm64" ;;
            Darwin-x86_64)  PLATFORM="macos-x64" ;;
            *) echo "Unsupported platform: $(uname -s)-$(uname -m)" && exit 1 ;;
          esac
          sha_var="SHA256_${PLATFORM//-/_}"
          expected="${!sha_var}"
          INSTALL_DIR="${RUNNER_TEMP}/llama-server"
          TARBALL="${RUNNER_TEMP}/llama-${LLAMA_TAG}-bin-${PLATFORM}.tar.gz"
          curl -fsSL "https://github.com/ggml-org/llama.cpp/releases/download/${LLAMA_TAG}/llama-${LLAMA_TAG}-bin-${PLATFORM}.tar.gz" -o "$TARBALL"
          if command -v sha256sum >/dev/null; then
            actual=$(sha256sum "$TARBALL" | awk '{print $1}')
          else
            actual=$(shasum -a 256 "$TARBALL" | awk '{print $1}')
          fi
          if [ "$actual" != "$expected" ]; then
            echo "Checksum mismatch for $PLATFORM: expected $expected, got $actual" && exit 1
          fi
          tar xz -C "${RUNNER_TEMP}" -f "$TARBALL"
          mv "${RUNNER_TEMP}/llama-${LLAMA_TAG}" "$INSTALL_DIR"
          echo "$INSTALL_DIR" >> "$GITHUB_PATH"
          echo "LLAMA_DIR=$INSTALL_DIR" >> "$GITHUB_ENV"
          llama-server --version || true
      - name: Install dependencies
        run: pip install -e ".[dev]"
      - name: Run embedding tests
        env:
          LD_LIBRARY_PATH: ${{ env.LLAMA_DIR }}
          DYLD_LIBRARY_PATH: ${{ env.LLAMA_DIR }}
        run: pytest tests/integration -v -m embedding

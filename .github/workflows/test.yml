name: Tests

on:
  # PRs only. `main` is reached exclusively through PRs (squash merge), so a
  # push-to-main trigger would just re-run what the PR already validated — pure
  # redundant spend.
  #
  # CI ALWAYS runs on every PR — there is no `ci`-label gate (retired in #678).
  # A draft PR triggers `pull_request` events too, so the suite runs while the PR
  # is still a draft; combined with drafts-by-default that means nothing is ever
  # mergeable before CI has actually run (a draft can't merge, and once marked
  # ready the required `CI passed` check is the real suite's verdict). Public
  # repo: standard runners bill nothing, and the Bazel disk cache replays
  # unchanged targets, so running on every push is cheap.
  # `labeled`/`unlabeled` are in the trigger types so adding/removing a
  # cross-platform label (`rc`/`macos`/`linux-arm`) re-fires the workflow to add
  # or drop those legs (the default types don't fire on label changes).
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, labeled, unlabeled]

# `contents: read` for checkout; `pull-requests: read` so the `changes` job's
# paths-filter can list this PR's changed files via the API (the default token
# is contents-only here, which fails with "Resource not accessible by integration").
permissions:
  contents: read
  pull-requests: read

# Cancel a PR's in-flight run when a new commit is pushed to it: every follow-up
# commit otherwise lets the older run (lint + tests) finish on a commit nobody
# will merge, burning Actions minutes. Grouped by `github.ref`
# (`refs/pull/<n>/merge`), so cancellation is scoped to the same PR — never across
# PRs. The release workflow deliberately has no such group (a tag build must run
# to completion).
#
# Keyed on the ref ALONE — the ci/rc label-state keying went away with the gate
# (#678). Without a label-gated "sentinel" run there's no sentinel-vs-full race to
# avoid: a new push cancels the stale run; adding a cross-platform label
# (`rc`/`macos`/`linux-arm`) re-fires and cancels the base run so the replacement
# covers base + the new legs in one go (the base lanes replay from the Bazel cache).
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Path-filter probe for the lint lane. The `tests` job carries NO path outputs
  # — Bazel's own dependency analysis decides what re-executes there (#422); the
  # filters here only gate the lint lane, whose cargo/ruff/mypy steps live outside
  # the Bazel graph. Always runs (the `ci`-label gate that used to live on this
  # job's `if` was retired in #678); `lint`/`tests` `needs: changes`.
  changes:
    name: Detect changed paths
    runs-on: ubuntu-latest
    outputs:
      code: ${{ steps.filter.outputs.code }}
      native: ${{ steps.filter.outputs.native }}
    steps:
      - uses: actions/checkout@v6
      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            code:
              - 'src/**'
              - 'tests/**'
              - 'pyproject.toml'
              - '.github/workflows/test.yml'
            native:
              # Gates the lint job's cargo steps (fmt/clippy) only — the test
              # job needs no such gate since Bazel resolves the Rust cone
              # itself. MODULE.bazel(.lock) carry the Rust toolchain + crate
              # pins; the workflow + composite define the steps.
              - 'shrike-core/**'
              - 'MODULE.bazel'
              - 'MODULE.bazel.lock'
              - '.bazelversion'
              - 'bazel'
              - 'tools/bazel.lock'
              - '.github/workflows/test.yml'
              - '.github/actions/rust-setup/action.yml'

  lint:
    name: Lint & type check
    needs: changes
    # `|| native` (#437): the cargo fmt/clippy steps live in THIS job behind
    # their own `native` step-gates — without it a native-only PR skipped the
    # whole job and the step-gates never got evaluated, so Rust changes shipped
    # unlinted (and the shrike_native Python shim with them). `|| rc-label`
    # forces this lane even on a docs-only diff the path filter would skip, so
    # a release candidate runs the full suite at the PR level rather than first
    # at the v* tag (#152).
    if: needs.changes.outputs.code == 'true' || needs.changes.outputs.native == 'true' || contains(github.event.pull_request.labels.*.name, 'rc')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0  # full history + tags so hatch-vcs can derive the version at install
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      # uv installs deps ~3x faster than pip (parallel + hardlinked cache),
      # cutting the per-job dependency install that runs in every lane.
      # Exact tag: setup-uv v8+ publishes no moving major tag (immutable
      # releases) — `@v8` does not resolve, so pin the full version.
      - uses: astral-sh/setup-uv@v8.2.0
        with:
          enable-cache: true
          cache-dependency-glob: pyproject.toml
      - name: Install dependencies
        run: uv pip install --system -e ".[dev]"
      # shrike-core/shrike-py/python is the extension's Python shim package (#437):
      # outside src/, so it was in no ruff scope anywhere and lint debt
      # accumulated invisibly. (Its .pyi stubs are additionally
      # stubtest-validated under Bazel in the tests lane.)
      - name: Ruff check
        run: ruff check src/shrike/ tests/ shrike-core/shrike-py/python/
      - name: Ruff format check
        run: ruff format --check src/shrike/ tests/ shrike-core/shrike-py/python/
      - name: Mypy
        run: mypy src/shrike/
      # Rust lint (#304): the idiomatic gates for the native workspace —
      # rustfmt and clippy-as-errors. Gated on the native path filter so a
      # pure-Python PR doesn't pay for a Rust toolchain or a clippy build;
      # rc-labelled PRs run it regardless (full-suite release posture). The
      # GitHub runner ships rustup; sync to the repo's pinned toolchain default.
      # The rust-setup composite (#422) carries the shared rust-cache + protoc
      # preamble; `shared-key: rust-lint` makes the cache one logical entry
      # with warm-cache.yml's warm-rust-lint job — a PR's cache save is
      # invisible to sibling PRs (only main's scope is shared, the #93 lesson),
      # so the warmer seeds main and every PR restores from there.
      - name: Set up Rust cache + protoc
        if: needs.changes.outputs.native == 'true' || contains(github.event.pull_request.labels.*.name, 'rc')
        uses: ./.github/actions/rust-setup
        with:
          shared-key: rust-lint
      - name: Rust format check
        if: needs.changes.outputs.native == 'true' || contains(github.event.pull_request.labels.*.name, 'rc')
        run: cd shrike-core && cargo fmt --check
      # Since the cutover the collection core + kernel are on the default
      # build, so clippy covers the whole workspace.
      - name: Rust clippy
        if: needs.changes.outputs.native == 'true' || contains(github.event.pull_request.labels.*.name, 'rc')
        # DESCRIPTORS_BIN: both anki build scripts honor it; without it they
        # hand the descriptor set over via cargo's shared target dir, which
        # rust-cache prunes between runs (the file isn't a crate artifact).
        # The checked-in pin keeps the build hermetic under a restored cache;
        # anki_proto's write_file_if_changed re-verifies it (a content drift
        # would show as a dirty file — a tag-bump tripwire, not a hazard).
        env:
          DESCRIPTORS_BIN: ${{ github.workspace }}/shrike-core/third_party/anki/anki_descriptors.bin
        run: |
          cd shrike-core
          cargo clippy --workspace --all-targets -- -D warnings

  # The authoritative test lane (#422): ONE `bazel test` invocation over the
  # full graph plus the embedding halves; Bazel's dependency analysis + the
  # content-addressed caches decide what re-executes. That includes TEST
  # RESULTS — a populated disk cache replays an unchanged test as "(cached)
  # PASSED" (verified: a wiped workspace replayed the unit suite in ~3s) — and
  # the Rust dependency cone, which is just more cached actions.
  # warm-cache.yml runs this same invocation on main, so PRs restore build and
  # test results alike.
  #
  # No sub-lanes and no path gating: `needs: changes` carries the ci-label
  # gate (a skipped `changes` cascades), and a docs-only labeled PR costs one
  # mostly-cache-hit invocation — the price of having no hand-rolled filter to
  # get wrong (#418's tests/** gap, the embedding filter missing shrike-core/**).
  # The embedding halves are named explicitly only because they're `manual` —
  # which they are to keep the local `bazel test //...` dev loop from fetching
  # models / booting llama-server, not as a CI distinction. The committed
  # ./bazel launcher bootstraps bazelisk + Bazel; no setup-python (the
  # toolchain is hermetic); bazel-setup wires the caches via .bazelrc.user.
  tests:
    name: Tests (linux)
    needs: changes
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/bazel-setup
      - name: Run the test graph
        run: |
          ./bazel test \
            -- //... //tests/integration:embedding_core //tests/integration:embedding_backends
      # Save even when tests failed (#438): the compiled graph + passing test
      # results are valid regardless of which test flaked. `save: pr` (#645):
      # save ONLY the churning bazel-disk (compiled-crate + test-result) entry.
      # The big bazel-models + bazel-repo blobs are warmed on main (linux x64,
      # this lane's scope) and every PR reads them cross-ref from main's scope —
      # a PR re-saving them just stamps a redundant ref-scoped 1.7 GB copy that
      # crowds the 10 GB budget and evicts the disk cache (the #645 root cause).
      - uses: ./.github/actions/bazel-save
        if: always()
        with:
          save: pr

  # The expensive cross-platform ARM legs — macOS (Apple Silicon) and Linux ARM.
  # These never run on a plain PR; they're opt-in by label (the only label gate
  # left after #678 retired the `ci` gate) because each runs the whole Bazel graph
  # on a second/third runner:
  #   - `rc` (release candidate): ALL legs. Apply before tagging a release for
  #     complete cross-platform coverage. `rc` SUBSUMES the per-leg labels below.
  #   - `macos`: just the macos-latest leg (Apple Silicon / ARM macOS) — for a
  #     macOS-specific change (Swift/Vision glue, the PyO3 link path) without the
  #     broader rc treatment.
  #   - `linux-arm`: just the ubuntu-24.04-arm leg.
  # Runs the whole Bazel graph (including the `manual` embedding target + the
  # Rust/PyO3 seam) for each selected platform — the macOS-only PyO3 link path
  # (-undefined dynamic_lookup) + the .so rename can't be reached on the
  # per-PR linux lane (#247 review). Label-gated regardless of paths: the
  # label asks for platform coverage no matter how small the diff.
  cross-platform:
    name: Cross-platform (${{ matrix.os }})
    if: >-
      contains(github.event.pull_request.labels.*.name, 'rc') ||
      contains(github.event.pull_request.labels.*.name, 'macos') ||
      contains(github.event.pull_request.labels.*.name, 'linux-arm')
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        # Build the leg list from the labels present: `rc` (or BOTH per-leg
        # labels) → the full matrix; otherwise just the requested leg. `&&` binds
        # tighter than `||`, so this reads as
        #   (rc || (macos && linux-arm)) ? [both] : linux-arm ? [linux] : [macos]
        # and the job `if` above guarantees at least one of the three is present.
        os: ${{ fromJSON((contains(github.event.pull_request.labels.*.name, 'rc') || (contains(github.event.pull_request.labels.*.name, 'macos') && contains(github.event.pull_request.labels.*.name, 'linux-arm'))) && '["ubuntu-24.04-arm", "macos-latest"]' || contains(github.event.pull_request.labels.*.name, 'linux-arm') && '["ubuntu-24.04-arm"]' || '["macos-latest"]') }}
    steps:
      - uses: actions/checkout@v6
      # Same composite as every Bazel lane (different os/arch key scope, so no
      # collision with the linux entries).
      - uses: ./.github/actions/bazel-setup
      # The same single invocation as the per-PR lane — this lane is the
      # cross-platform proof.
      - name: Run the test graph
        run: |
          ./bazel test \
            -- //... //tests/integration:embedding_core //tests/integration:embedding_backends
      # `save: all` (the default), NOT `pr` (#645): warm-cache.yml only warms the
      # linux x64 scope, so the arm64/macos scopes have NO main-warmed
      # bazel-repo/bazel-models entry to read — this rare label-gated lane is the
      # only seeder for its own os/arch scope and must save the full set. (Its
      # os/arch key scope is disjoint from the linux budget, so the duplication
      # the linux PR lane avoids doesn't apply here.)
      - uses: ./.github/actions/bazel-save
        if: always()

  # The single required status check (the `protect main` ruleset requires the
  # GitHub Actions context "CI passed"). It ALWAYS runs and is success iff every
  # lane either succeeded or legitimately skipped (lint skipped by path filter; a
  # cross-platform leg not requested by label). The lanes can individually skip,
  # and a ruleset reads a skipped required check as PASSING — which is exactly why
  # the verdict is centralised in this aggregator and IT, never the individual
  # jobs, is the required context. It must stay a real DECLARED job: a check run
  # posted via the API does NOT satisfy a ruleset check pinned to the Actions
  # integration (learned in #664).
  #
  # Coverage is intentionally NOT aggregated here — it lives in its own workflow
  # (coverage.yml) and only ever reports, never gates, so it must not block the merge.
  ci-ok:
    name: CI passed
    if: ${{ always() }}
    needs: [changes, lint, tests, cross-platform]
    runs-on: ubuntu-latest
    steps:
      - name: Verify gated jobs passed or were skipped
        run: |
          if [ "${{ needs.changes.result }}" != "success" ]; then
            echo "::error::changes job result was '${{ needs.changes.result }}'"; exit 1
          fi
          for r in \
            "lint=${{ needs.lint.result }}" \
            "tests=${{ needs.tests.result }}" \
            "cross-platform=${{ needs.cross-platform.result }}"; do
            case "${r#*=}" in
              success|skipped) echo "ok: $r" ;;
              *) echo "::error::$r"; exit 1 ;;
            esac
          done
          echo "All gated jobs passed or were skipped."

name: Tests

on:
  # PRs only. `main` is reached exclusively through PRs (squash merge), so a
  # push-to-main trigger would just re-run what the PR already validated — pure
  # redundant spend. `labeled` is included so applying the `rc` label re-triggers
  # CI (the default types don't fire on label changes); it gates the expensive
  # cross-platform job.
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, labeled]

# `contents: read` for checkout; `pull-requests: read` so the `changes` job's
# paths-filter can list this PR's changed files via the API (the default token
# is contents-only here, which fails with "Resource not accessible by integration").
permissions:
  contents: read
  pull-requests: read

# Cancel a PR's in-flight run when a new commit is pushed to it: every follow-up
# commit otherwise lets the older run (lint + test + maybe embedding) finish on a
# commit nobody will merge, burning Actions minutes. Grouped by `github.ref`
# (`refs/pull/<n>/merge`), so cancellation is scoped to the same PR — never across
# PRs. The release workflow deliberately has no such group (a tag build must run
# to completion).
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Decide which lanes need to run for this PR's diff. Docs-only changes skip
  # every test job (only `ci-ok` runs); the embedding lane (which spins up
  # llama-server) is skipped unless something that can affect embedding/search
  # changed. `changes` is cheap — checkout + a path diff. NOTE: the per-job `if`s
  # mean jobs get *skipped*, not run-and-passed, so the single required status
  # check for branch protection must be `ci-ok` (below), never the individual
  # jobs — a skipped required check blocks the merge forever.
  changes:
    name: Detect changed paths
    runs-on: ubuntu-latest
    outputs:
      code: ${{ steps.filter.outputs.code }}
      embedding: ${{ steps.filter.outputs.embedding }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            code:
              - 'src/**'
              - 'tests/**'
              - 'pyproject.toml'
              - '.github/workflows/test.yml'
            embedding:
              # Conservative: any source change can reach the server the
              # embedding/search tests drive, so gate on all of src/shrike plus
              # the embedding-specific tests and the llama-server install path.
              - 'src/shrike/**'
              - 'tests/integration/test_embedding.py'
              - 'tests/integration/test_semantic.py'
              - 'tests/integration/test_backends.py'
              - 'tests/integration/test_onnx_models.py'
              - 'tests/integration/test_clip_model.py'
              # Shared harness that the embedding lane depends on (model
              # download/cache, server fixtures) and the workflow itself.
              - 'tests/integration/conftest.py'
              - 'tests/integration/model_cache.py'
              - 'tests/unit/test_embedding.py'
              - 'tests/unit/test_embedding_onnx.py'
              - 'tests/unit/test_embedding_clip.py'
              - 'tests/unit/test_index.py'
              - 'tests/unit/test_note_embedding_text.py'
              - 'tests/unit/test_tools_search.py'
              - '.github/scripts/install-llama-server.sh'
              - '.github/workflows/test.yml'
              - 'pyproject.toml'

  lint:
    name: Lint & type check
    needs: changes
    # `|| rc-label` forces this lane even on a docs-only diff the path filter
    # would skip, so a release candidate runs the full suite at the PR level
    # rather than first at the v* tag (#152).
    if: needs.changes.outputs.code == 'true' || contains(github.event.pull_request.labels.*.name, 'rc')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # full history + tags so hatch-vcs can derive the version at install
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      # uv installs deps ~3x faster than pip (parallel + hardlinked cache),
      # cutting the per-job dependency install that runs in every lane.
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: pyproject.toml
      - name: Install dependencies
        run: uv pip install --system -e ".[dev]"
      - name: Ruff check
        run: ruff check src/shrike/ tests/
      - name: Ruff format check
        run: ruff format --check src/shrike/ tests/
      - name: Mypy
        run: mypy src/shrike/

  # Unit + non-embedding integration on Linux x64. Runs the FULL suite as the
  # per-PR correctness gate — but WITHOUT the coverage tracer, which ~2-3x'd this
  # lane on every PR for a number that only needs checking at release time. The
  # coverage measurement + fail_under gate moved off the per-PR path to the
  # `coverage` job below (rc-labelled PRs) and the scheduled coverage.yml run.
  test:
    name: Tests (linux)
    needs: changes
    # `|| rc-label` forces this lane even on a docs-only diff the path filter
    # would skip, so a release candidate runs the full suite at the PR level
    # rather than first at the v* tag (#152).
    if: needs.changes.outputs.code == 'true' || contains(github.event.pull_request.labels.*.name, 'rc')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # full history + tags so hatch-vcs can derive the version at install
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      # uv installs deps ~3x faster than pip (parallel + hardlinked cache),
      # cutting the per-job dependency install that runs in every lane.
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: pyproject.toml
      - name: Install dependencies
        run: uv pip install --system -e ".[dev]"
      # One combined `-n auto` run over both suites: xdist balances the work so
      # quick unit tests keep workers busy while integration servers spawn,
      # instead of two phases that each leave workers idle. `-m "not embedding"`
      # keeps the embedding-gated tests out; unit tests carry no marker so all of
      # them run. No coverage tracer here — see the `coverage` job.
      - name: Run unit + integration
        run: pytest tests/unit tests/integration -q -m "not embedding" -n auto

  embedding:
    name: Embedding tests (linux)
    needs: changes
    # Same rc-label escape hatch as the lint/test lanes (#152).
    if: needs.changes.outputs.embedding == 'true' || contains(github.event.pull_request.labels.*.name, 'rc')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # full history + tags so hatch-vcs can derive the version at install
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      # uv installs deps ~3x faster than pip (parallel + hardlinked cache),
      # cutting the per-job dependency install that runs in every lane.
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: pyproject.toml
      # Cache the pinned llama-server build so we don't re-download the release
      # tarball every run (#83). Keyed on the lock file (tag + SHA256), so a bump
      # invalidates it; install-llama-server.sh skips the download on a hit.
      - name: Cache llama-server
        uses: actions/cache@v4
        with:
          path: ${{ runner.temp }}/llama-server
          key: llama-server-${{ runner.os }}-${{ hashFiles('scripts/llama-server.lock') }}
      - name: Install llama-server
        run: bash .github/scripts/install-llama-server.sh
      - name: Install dependencies
        # [onnx] + [clip] add onnxruntime + tokenizers + pillow so the embedding lane
        # exercises all three backends (llama-server, ONNX text, CLIP image<->text) per
        # test_backends.py / test_onnx_models.py (#172) and test_clip_model.py (#162).
        run: uv pip install --system -e ".[dev,onnx,clip]"
      # Persist the embedding models across runs so we don't re-hit HuggingFace
      # every time (the source of the 429 flake, #83). The fixtures read
      # SHRIKE_TEST_MODEL_DIR; it holds the GGUF plus both ONNX model dirs (MiniLM +
      # DistilRoBERTa) — bump the key whenever that set changes.
      - name: Cache embedding models
        uses: actions/cache@v4
        with:
          path: ${{ runner.temp }}/shrike-test-models
          key: embedding-model-all-MiniLM-L6-v2-Q4_K_M-onnx-int8-roberta-fp32-clip
      - name: Run embedding tests
        env:
          LD_LIBRARY_PATH: ${{ env.LLAMA_DIR }}
          SHRIKE_TEST_MODEL_DIR: ${{ runner.temp }}/shrike-test-models
        run: pytest tests/integration -v -m embedding

  # macOS + ARM are expensive (macOS bills at 10x), so they NEVER run on plain
  # PRs or on merges to main — only when a PR carries the `rc` (release
  # candidate) label. Apply the label when you're about to tag a release and want
  # full cross-platform coverage first. Each runs the full integration suite
  # (including embedding) for that platform. Label-gated regardless of paths: a
  # release candidate gets full coverage no matter how small the diff.
  cross-platform:
    name: Cross-platform (${{ matrix.os }})
    if: contains(github.event.pull_request.labels.*.name, 'rc')
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04-arm, macos-latest]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # full history + tags so hatch-vcs can derive the version at install
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      # uv installs deps ~3x faster than pip (parallel + hardlinked cache),
      # cutting the per-job dependency install that runs in every lane.
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: pyproject.toml
      - name: Cache llama-server
        uses: actions/cache@v4
        with:
          path: ${{ runner.temp }}/llama-server
          key: llama-server-${{ matrix.os }}-${{ hashFiles('scripts/llama-server.lock') }}
      - name: Install llama-server
        run: bash .github/scripts/install-llama-server.sh
      - name: Install dependencies
        run: uv pip install --system -e ".[dev]"
      - name: Cache embedding model
        uses: actions/cache@v4
        with:
          path: ${{ runner.temp }}/shrike-test-models
          key: embedding-model-all-MiniLM-L6-v2-Q4_K_M-${{ matrix.os }}
      - name: Run integration + embedding tests
        env:
          LD_LIBRARY_PATH: ${{ env.LLAMA_DIR }}
          DYLD_LIBRARY_PATH: ${{ env.LLAMA_DIR }}
          SHRIKE_TEST_MODEL_DIR: ${{ runner.temp }}/shrike-test-models
        run: pytest tests/integration -v -m integration

  # Single required status check. Always runs, and passes iff every gated job
  # either succeeded or was legitimately skipped (its paths didn't change / not
  # an rc PR). This is what branch protection should require — it turns the
  # conditional jobs into one stable check that never deadlocks a merge.
  ci-ok:
    name: CI passed
    if: ${{ always() }}
    # Coverage is intentionally NOT aggregated here — it lives in its own workflow
    # (coverage.yml) and only ever reports, never gates, so it must not block the merge.
    needs: [changes, lint, test, embedding, cross-platform]
    runs-on: ubuntu-latest
    steps:
      - name: Verify gated jobs passed or were skipped
        run: |
          if [ "${{ needs.changes.result }}" != "success" ]; then
            echo "::error::changes job result was '${{ needs.changes.result }}'"; exit 1
          fi
          for r in \
            "lint=${{ needs.lint.result }}" \
            "test=${{ needs.test.result }}" \
            "embedding=${{ needs.embedding.result }}" \
            "cross-platform=${{ needs.cross-platform.result }}"; do
            case "${r#*=}" in
              success|skipped) echo "ok: $r" ;;
              *) echo "::error::$r"; exit 1 ;;
            esac
          done
          echo "All gated jobs passed or were skipped."

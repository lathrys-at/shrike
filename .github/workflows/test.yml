name: Tests

on:
  # PRs only. `main` is reached exclusively through PRs (squash merge), so a
  # push-to-main trigger would just re-run what the PR already validated — pure
  # redundant spend.
  #
  # CI is GATED on the `ci` label: nothing but the tiny `ci-ok` sentinel runs
  # until a PR carries `ci` (or `rc`, which implies full CI for a release
  # candidate). This defers every remote run until code review is complete, so a
  # PR that churns through review doesn't re-run the whole suite on each push —
  # the suite runs once, at the end, when you add `ci`. (Public repo: standard
  # runners bill nothing — the deferral buys wall-clock/queue/noise, and keeps
  # the posture safe if the repo ever goes private.)
  # `labeled` is in the trigger types so adding `ci`/`rc`/`macOS` re-fires the
  # workflow (the default types don't fire on label changes); `unlabeled` so
  # removing the label re-evaluates the `ci-ok` gate (flips it back to "add the
  # ci label").
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, labeled, unlabeled]

# `contents: read` for checkout; `pull-requests: read` so the `changes` job's
# paths-filter can list this PR's changed files via the API (the default token
# is contents-only here, which fails with "Resource not accessible by integration").
permissions:
  contents: read
  pull-requests: read

# Cancel a PR's in-flight run when a new commit is pushed to it: every follow-up
# commit otherwise lets the older run (lint + tests) finish on a commit nobody
# will merge, burning Actions minutes. Grouped by `github.ref`
# (`refs/pull/<n>/merge`), so cancellation is scoped to the same PR — never across
# PRs. The release workflow deliberately has no such group (a tag build must run
# to completion).
#
# The group is ALSO keyed on the ci/rc label state (#400): pushing then labeling
# delivers a `synchronize` event whose payload lacks the label moments before
# the `labeled` event, and in one shared group whichever run starts second
# cancels the first — when the label-less sentinel won, it killed the full suite
# and left the fail-closed `ci-ok` as the survivor (the "every job skipping"
# shape that needed a label toggle and a whole re-run). With the label state in
# the key, sentinel runs (no label → only `ci-ok`, fails fast) and full runs
# never cancel each other; a push to an already-labeled PR still cancels that
# PR's stale full run (its `synchronize` payload carries the label). The
# `action == 'unlabeled'` clause joins the labeled group so REMOVING ci/rc still
# cancels an in-flight suite — the gate flips back to fail-closed instead of a
# doomed run finishing green.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}-${{ contains(github.event.pull_request.labels.*.name, 'ci') || contains(github.event.pull_request.labels.*.name, 'rc') || github.event.action == 'unlabeled' }}
  cancel-in-progress: true

jobs:
  # The ci-label gate root, plus the lint job's path filters. The `tests` job
  # carries NO path outputs — Bazel's own dependency analysis decides what
  # re-executes there (#422); the filters here only gate the lint lane, whose
  # cargo/ruff/mypy steps live outside the Bazel graph. NOTE: the per-job `if`s
  # mean jobs get *skipped*, not run-and-passed, so the single required status
  # check for branch protection must be `ci-ok` (below), never the individual
  # jobs — a skipped required check blocks the merge forever.
  changes:
    name: Detect changed paths
    # The `ci`-label gate. `changes` is the root of the dependency graph
    # (lint/tests `needs: changes`), so skipping it here when the PR lacks
    # `ci`/`rc` cascades — every downstream lane is skipped too, and not a
    # single test runner spins up. `cross-platform` is the only lane outside
    # this graph; it is `rc`/`macOS`-gated on its own (`rc` is part of this
    # condition anyway; a bare `macOS` label adds the macos leg without
    # implying `ci`).
    if: contains(github.event.pull_request.labels.*.name, 'ci') || contains(github.event.pull_request.labels.*.name, 'rc')
    runs-on: ubuntu-latest
    outputs:
      code: ${{ steps.filter.outputs.code }}
      native: ${{ steps.filter.outputs.native }}
    steps:
      - uses: actions/checkout@v6
      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            code:
              - 'src/**'
              - 'tests/**'
              - 'pyproject.toml'
              - '.github/workflows/test.yml'
            native:
              # Gates the lint job's cargo steps (fmt/clippy) only — the test
              # job needs no such gate since Bazel resolves the Rust cone
              # itself. MODULE.bazel(.lock) carry the Rust toolchain + crate
              # pins; the workflow + composite define the steps.
              - 'native/**'
              - 'MODULE.bazel'
              - 'MODULE.bazel.lock'
              - '.bazelversion'
              - 'bazel'
              - 'tools/bazel.lock'
              - '.github/workflows/test.yml'
              - '.github/actions/rust-setup/action.yml'

  lint:
    name: Lint & type check
    needs: changes
    # `|| native` (#437): the cargo fmt/clippy steps live in THIS job behind
    # their own `native` step-gates — without it a native-only PR skipped the
    # whole job and the step-gates never got evaluated, so Rust changes shipped
    # unlinted (and the shrike_native Python shim with them). `|| rc-label`
    # forces this lane even on a docs-only diff the path filter would skip, so
    # a release candidate runs the full suite at the PR level rather than first
    # at the v* tag (#152).
    if: needs.changes.outputs.code == 'true' || needs.changes.outputs.native == 'true' || contains(github.event.pull_request.labels.*.name, 'rc')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0  # full history + tags so hatch-vcs can derive the version at install
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      # uv installs deps ~3x faster than pip (parallel + hardlinked cache),
      # cutting the per-job dependency install that runs in every lane.
      # Exact tag: setup-uv v8+ publishes no moving major tag (immutable
      # releases) — `@v8` does not resolve, so pin the full version.
      - uses: astral-sh/setup-uv@v8.2.0
        with:
          enable-cache: true
          cache-dependency-glob: pyproject.toml
      - name: Install dependencies
        run: uv pip install --system -e ".[dev]"
      # native/shrike-py/python is the extension's Python shim package (#437):
      # outside src/, so it was in no ruff scope anywhere and lint debt
      # accumulated invisibly. (Its .pyi stubs are additionally
      # stubtest-validated under Bazel in the tests lane.)
      - name: Ruff check
        run: ruff check src/shrike/ tests/ native/shrike-py/python/
      - name: Ruff format check
        run: ruff format --check src/shrike/ tests/ native/shrike-py/python/
      - name: Mypy
        run: mypy src/shrike/
      # Rust lint (#304): the idiomatic gates for the native workspace —
      # rustfmt and clippy-as-errors. Gated on the native path filter so a
      # pure-Python PR doesn't pay for a Rust toolchain or a clippy build;
      # rc-labelled PRs run it regardless (full-suite release posture). The
      # GitHub runner ships rustup; sync to the repo's pinned toolchain default.
      # The rust-setup composite (#422) carries the shared rust-cache + protoc
      # preamble; `shared-key: rust-lint` makes the cache one logical entry
      # with warm-cache.yml's warm-rust-lint job — a PR's cache save is
      # invisible to sibling PRs (only main's scope is shared, the #93 lesson),
      # so the warmer seeds main and every PR restores from there.
      - name: Set up Rust cache + protoc
        if: needs.changes.outputs.native == 'true' || contains(github.event.pull_request.labels.*.name, 'rc')
        uses: ./.github/actions/rust-setup
        with:
          shared-key: rust-lint
      - name: Rust format check
        if: needs.changes.outputs.native == 'true' || contains(github.event.pull_request.labels.*.name, 'rc')
        run: cd native && cargo fmt --check
      # Since the cutover the collection core + kernel are on the default
      # build, so clippy covers the whole workspace.
      - name: Rust clippy
        if: needs.changes.outputs.native == 'true' || contains(github.event.pull_request.labels.*.name, 'rc')
        # DESCRIPTORS_BIN: both anki build scripts honor it; without it they
        # hand the descriptor set over via cargo's shared target dir, which
        # rust-cache prunes between runs (the file isn't a crate artifact).
        # The checked-in pin keeps the build hermetic under a restored cache;
        # anki_proto's write_file_if_changed re-verifies it (a content drift
        # would show as a dirty file — a tag-bump tripwire, not a hazard).
        env:
          DESCRIPTORS_BIN: ${{ github.workspace }}/native/third_party/anki/anki_descriptors.bin
        run: |
          cd native
          cargo clippy --workspace --all-targets -- -D warnings

  # The authoritative test lane (#422): ONE `bazel test` invocation over the
  # full graph plus the embedding halves; Bazel's dependency analysis + the
  # content-addressed caches decide what re-executes. That includes TEST
  # RESULTS — a populated disk cache replays an unchanged test as "(cached)
  # PASSED" (verified: a wiped workspace replayed the unit suite in ~3s) — and
  # the Rust dependency cone, which is just more cached actions.
  # warm-cache.yml runs this same invocation on main, so PRs restore build and
  # test results alike.
  #
  # No sub-lanes and no path gating: `needs: changes` carries the ci-label
  # gate (a skipped `changes` cascades), and a docs-only labeled PR costs one
  # mostly-cache-hit invocation — the price of having no hand-rolled filter to
  # get wrong (#418's tests/** gap, the embedding filter missing native/**).
  # The embedding halves are named explicitly only because they're `manual` —
  # which they are to keep the local `bazel test //...` dev loop from fetching
  # models / booting llama-server, not as a CI distinction. The committed
  # ./bazel launcher bootstraps bazelisk + Bazel; no setup-python (the
  # toolchain is hermetic); bazel-setup wires the caches via .bazelrc.user.
  tests:
    name: Tests (linux)
    needs: changes
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/bazel-setup
      - name: Run the test graph
        run: |
          ./bazel test \
            -- //... //tests/integration:embedding_core //tests/integration:embedding_backends

  # macOS + ARM never run on plain PRs or on merges to main — only by label.
  # Two labels gate this lane, by intent:
  #   - `rc` (release candidate): the FULL os matrix. Apply when you're about
  #     to tag a release and want complete cross-platform coverage first.
  #   - `macOS`: just the macos-latest leg, for a PR whose change is
  #     macOS-specific (the Swift/Vision platform glue, the PyO3 link path)
  #     and needs a macOS CI proof without the broader rc treatment.
  # Runs the whole Bazel graph (including the `manual` embedding target + the
  # Rust/PyO3 seam) for each selected platform — the macOS-only PyO3 link path
  # (-undefined dynamic_lookup) + the .so rename can't be reached on the
  # per-PR linux lane (#247 review). Label-gated regardless of paths: the
  # label asks for platform coverage no matter how small the diff.
  cross-platform:
    name: Cross-platform (${{ matrix.os }})
    if: >-
      contains(github.event.pull_request.labels.*.name, 'rc') ||
      contains(github.event.pull_request.labels.*.name, 'macOS')
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        # `rc` selects the full matrix; a bare `macOS` label selects only the
        # macos-latest leg.
        os: ${{ fromJSON(contains(github.event.pull_request.labels.*.name, 'rc') && '["ubuntu-24.04-arm", "macos-latest"]' || '["macos-latest"]') }}
    steps:
      - uses: actions/checkout@v6
      # Same composite as every Bazel lane (different os/arch key scope, so no
      # collision with the linux entries).
      - uses: ./.github/actions/bazel-setup
      # The same single invocation as the per-PR lane — this lane is the
      # cross-platform proof.
      - name: Run the test graph
        run: |
          ./bazel test \
            -- //... //tests/integration:embedding_core //tests/integration:embedding_backends

  # Single required status check. Always runs, and passes iff every gated job
  # either succeeded or was legitimately skipped (its paths didn't change / not
  # an rc PR). This is what branch protection should require — it turns the
  # conditional jobs into one stable check that never deadlocks a merge.
  ci-ok:
    name: CI passed
    if: ${{ always() }}
    # Coverage is intentionally NOT aggregated here — it lives in its own workflow
    # (coverage.yml) and only ever reports, never gates, so it must not block the merge.
    needs: [changes, lint, tests, cross-platform]
    runs-on: ubuntu-latest
    steps:
      # Gate: CI must be opted in via the `ci` (or `rc`) label. Without it the
      # whole graph above is skipped, so this required check fails with an
      # actionable message — the PR can't merge until someone adds `ci` and the
      # suite actually runs. This is the enforcement half of the deferral: CI is
      # deferred, not skipped — it must still pass before merge.
      - name: Require the ci (or rc) label
        if: ${{ !(contains(github.event.pull_request.labels.*.name, 'ci') || contains(github.event.pull_request.labels.*.name, 'rc')) }}
        run: |
          echo "::error::CI is gated on the 'ci' label — add the 'ci' label once code review is complete to run the suite (or 'rc' for a release candidate)."
          exit 1
      - name: Verify gated jobs passed or were skipped
        run: |
          if [ "${{ needs.changes.result }}" != "success" ]; then
            echo "::error::changes job result was '${{ needs.changes.result }}'"; exit 1
          fi
          for r in \
            "lint=${{ needs.lint.result }}" \
            "tests=${{ needs.tests.result }}" \
            "cross-platform=${{ needs.cross-platform.result }}"; do
            case "${r#*=}" in
              success|skipped) echo "ok: $r" ;;
              *) echo "::error::$r"; exit 1 ;;
            esac
          done
          echo "All gated jobs passed or were skipped."

name: Tests

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  lint:
    name: Lint & type check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: pip install -e ".[dev]"
      - name: Ruff check
        run: ruff check src/shrike/ tests/
      - name: Ruff format check
        run: ruff format --check src/shrike/ tests/
      - name: Mypy
        run: mypy src/shrike/

  unit:
    name: Unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: pip install -e ".[dev]"
      - name: Run unit tests
        run: pytest tests/unit -v

  integration:
    name: Integration tests (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, ubuntu-24.04-arm, macos-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: pip install -e ".[dev]"
      - name: Run integration tests
        run: pytest tests/integration -v -m "integration and not embedding"

  embedding:
    name: Embedding tests (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, ubuntu-24.04-arm, macos-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install llama-server
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG=$(gh api repos/ggml-org/llama.cpp/releases/latest --jq .tag_name)
          case "$(uname -s)-$(uname -m)" in
            Linux-x86_64)   PLATFORM="ubuntu-x64" ;;
            Linux-aarch64)  PLATFORM="ubuntu-arm64" ;;
            Darwin-arm64)   PLATFORM="macos-arm64" ;;
            Darwin-x86_64)  PLATFORM="macos-x64" ;;
            *) echo "Unsupported platform: $(uname -s)-$(uname -m)" && exit 1 ;;
          esac
          INSTALL_DIR="${RUNNER_TEMP}/llama-server"
          curl -sL "https://github.com/ggml-org/llama.cpp/releases/download/${TAG}/llama-${TAG}-bin-${PLATFORM}.tar.gz" | tar xz -C "${RUNNER_TEMP}"
          mv "${RUNNER_TEMP}/llama-${TAG}" "$INSTALL_DIR"
          echo "$INSTALL_DIR" >> "$GITHUB_PATH"
          echo "LLAMA_DIR=$INSTALL_DIR" >> "$GITHUB_ENV"
          llama-server --version || true
      - name: Install dependencies
        run: pip install -e ".[dev]"
      - name: Run embedding tests
        env:
          LD_LIBRARY_PATH: ${{ env.LLAMA_DIR }}
          DYLD_LIBRARY_PATH: ${{ env.LLAMA_DIR }}
        run: pytest tests/integration -v -m embedding

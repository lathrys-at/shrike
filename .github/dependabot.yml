# Dependabot version updates. Security updates (vulnerability-driven bumps) are
# enabled separately in the repo's security settings and need no config here —
# Dependabot opens those PRs automatically too, and they flow through the same
# review/merge workflow (.github/workflows/claude-dependabot.yml).
#
# Every PR is labelled `deps` and grouped, so a week's bumps review together.
# The one derived artifact Dependabot can't regenerate — MODULE.bazel.lock (the
# Bazel crate-universe mirror of native/Cargo.lock) — is regenerated by the
# review workflow before the PR is allowed to merge.
version: 2
updates:
  # GitHub Actions: the workflow files plus the composite actions under
  # .github/actions (bazel-setup, bazel-save, rust-setup). Low risk; a broken
  # action bump shows up directly as a red CI run.
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    labels: ["deps"]
    groups:
      actions:
        patterns: ["*"]

  # Rust crates for the native/ workspace — the only cargo surface in the Bazel
  # build and under `bazel test //...`. A bump rewrites native/Cargo.lock; the
  # review workflow regenerates MODULE.bazel.lock to match before merge.
  # Minor+patch grouped; majors arrive as individual PRs for closer review.
  - package-ecosystem: cargo
    directory: "/native"
    schedule:
      interval: weekly
    labels: ["deps"]
    open-pull-requests-limit: 5
    groups:
      cargo-minor:
        update-types: ["minor", "patch"]

  # NOT auto-merged here on purpose:
  #
  # eval/spa-spike (cargo) is an experimental Tauri spike with its own Cargo.lock,
  # deliberately OUTSIDE the Bazel build and `bazel test //...` (see
  # docs/routines/dependency-security-update.md). A bump there is not verified by
  # repo CI, so "auto-merge anything green" would merge it unverified. Its
  # advisories are handled by the security routine / by hand instead. Uncomment
  # only alongside a workflow that runs `cargo build`/`cargo test` inside the
  # spike dir as that PR's gate.
  # - package-ecosystem: cargo
  #   directory: "/eval/spa-spike"
  #   schedule:
  #     interval: weekly
  #   labels: ["deps"]

  # Python (opt-in). The pyproject floors are open `>=`, so version updates mostly
  # surface security bumps; both uv-compiled locks (requirements_lock.txt,
  # requirements_sdist_lock.txt) are regenerated with the exact `uv pip compile`
  # command recorded in each lock's header — uncomment once the cargo lane has
  # proven the lock-regen flow.
  # - package-ecosystem: pip
  #   directory: "/"
  #   schedule:
  #     interval: weekly
  #   labels: ["deps"]
  #   groups:
  #     python-minor:
  #       update-types: ["minor", "patch"]

name: Set up Bazel caches
description: >
  The two split-cadence Bazel caches every Bazel lane shares (#418/#422), plus
  the flag wiring. Toolchains + repository cache are keyed on the pins — a pure
  restore unless a lock changed. The action/test-result disk cache must
  ACCUMULATE so an unchanged test is a cache hit (skipped, not re-run): a save
  never updates an existing key, so a lock-stable key would freeze after its
  first save and every later run would re-execute everything — the save key is
  suffixed with the run id so each run writes a fresh superset, and
  restore-keys pulls the most recent prior one. Finally, the cache paths are
  written into .bazelrc.user (gitignored, try-imported by .bazelrc) as
  absolute paths — Bazel does not expand ~ in flags — so every ./bazel
  invocation in the job picks them up without per-call flags.

  RESTORE-ONLY since #438: the combined actions/cache action's post-step
  skips its save when the job failed, which let a flake-red warm run starve
  main's scope of the Bazel 9 caches and put every PR back on a cold build.
  Saving is the explicit bazel-save composite, invoked with `if: always()` as
  the LAST step of every lane that uses this one — keys there MUST stay
  byte-identical to the keys here.
runs:
  using: composite
  steps:
    # Since Bazel 9 (#420) the bazel-repo path ALSO carries the repo contents
    # cache (extracted repo directories, defaulting to
    # `{--repository_cache}/contents`), not just downloads — which is what
    # collapses a fresh runner's loading/repo-extraction phase from minutes to
    # seconds (measured: 290s -> 6s post-expunge locally). No extra flag: the
    # default location lands inside the path this stanza already covers.
    - name: Restore Bazel toolchains + repo
      uses: actions/cache/restore@v5
      with:
        path: |
          ~/.cache/shrike/bazelisk
          ~/.cache/shrike/bazelisk-home
          ~/.cache/shrike/bazel-repo
        key: bazel-repo-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('MODULE.bazel.lock', 'requirements_lock.txt', '.bazelversion', 'tools/bazel.lock') }}
        restore-keys: bazel-repo-${{ runner.os }}-${{ runner.arch }}-
    - name: Restore Bazel action results
      uses: actions/cache/restore@v5
      with:
        path: ~/.cache/shrike/bazel-disk
        key: bazel-disk-${{ runner.os }}-${{ runner.arch }}-${{ github.run_id }}
        restore-keys: bazel-disk-${{ runner.os }}-${{ runner.arch }}-
    - name: Point Bazel at the caches via .bazelrc.user
      shell: bash
      # `common` so build/test/cquery all pick them up, and appended so a
      # hypothetical pre-existing entry isn't clobbered.
      run: |
        {
          echo "common --disk_cache=$HOME/.cache/shrike/bazel-disk"
          echo "common --repository_cache=$HOME/.cache/shrike/bazel-repo"
        } >> .bazelrc.user

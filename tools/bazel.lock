# Pinned build-system bootstrap — the only thing a clean checkout needs.
#
# The committed ./bazel wrapper downloads + checksum-verifies bazelisk (below),
# then bazelisk fetches Bazel (BAZEL_VERSION, mirrored in .bazelversion) and the
# wrapper hands it the matching BAZEL_SHA256 via BAZELISK_VERIFY_SHA256 — so the
# whole chain (launcher -> bazelisk -> Bazel) is hash-pinned end to end. Mirrors
# tools/llama-server.lock.
#
# Bump with tools/update-bazel-lock.sh (refreshes .bazelversion + every sha here).
BAZELISK_VERSION=v1.29.0
SHA256_darwin_arm64=cee851f726789227d5561004e9904a52be45c3efb56f8b38b6993d6adbaa0409
SHA256_darwin_amd64=16c3d7aa15323a9fb69f56c7ec5733ed18bedb786680d0ba13bb12a3c8083007
SHA256_linux_amd64=5a408715e932c0250d28bd84555f12edbf70117de42f9181691c736eacc4a992
SHA256_linux_arm64=e20e8b0f4f240091b7a55bf17b9398bd4f40ee70ae0208dff95dd4c445fb4010

# Bazel itself. BAZEL_VERSION must match .bazelversion (the wrapper checks, and
# only pins the sha when they agree). bazelisk downloads the binary; the wrapper
# verifies it via BAZELISK_VERIFY_SHA256 (shas from releases.bazel.build).
BAZEL_VERSION=9.1.1
BAZEL_SHA256_darwin_arm64=2db883718453f0437a7bcb408e889dbf8539cdc4d61c8ebc3807a1a88d02ff08
BAZEL_SHA256_darwin_amd64=6fd490084bdccf044d7a6d8360a26f8770fa09f4e624328efea292f493204930
BAZEL_SHA256_linux_amd64=857bed5d2756b4d998d3caebf2d941d13d434c4eda4b1d6d7dda205736c25a93
BAZEL_SHA256_linux_arm64=82d1163884e45a6a7ff764cc01197b1b1ed497000726b84dc4b47c1dfc8a2bb4

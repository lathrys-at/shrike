# Pinned bazelisk launcher — the only build-system bootstrap dependency.
#
# The committed `./bazel` wrapper downloads + checksum-verifies this bazelisk,
# then bazelisk fetches the Bazel version pinned in .bazelversion. So a clean
# checkout builds with nothing pre-installed. Mirrors scripts/llama-server.lock.
#
# Bump with tools/update-bazel-lock.sh (or by hand): set the version, then refresh
# every SHA256_* from the release's per-asset .sha256 files.
BAZELISK_VERSION=v1.29.0

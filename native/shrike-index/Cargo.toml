[package]
name = "shrike-index"
version.workspace = true
edition.workspace = true
publish.workspace = true
license.workspace = true
description = "Native vector index engine: usearch HNSW per-modality sub-indexes (#273)."

[lib]
name = "shrike_index"

# Pure Rust — NO pyo3 (epic #265 convention 5); bound to Python in shrike-py.
[dependencies]
shrike-ffi = { workspace = true }
# The official Rust binding over the same native C++ core as usearch-python.
# Pinned to the same core version as the Python binding (2.25.3) — the #272
# spike verdict's version-pin policy: bump both bindings together.
# default-features off: the `numkong` SIMD kernels' build-script include
# propagation breaks under Bazel's sandbox, and the portable core is fully
# sufficient here (the epic's acceptance is parity, not SIMD throughput —
# re-enable via a crate annotation if it ever matters).
usearch = { version = "=2.25.3", default-features = false }

[package]
name = "shrike-kernel"
version.workspace = true
edition.workspace = true
publish.workspace = true
license.workspace = true
description = "The pure-Rust kernel: collection + index + derived store + fusion, no CPython (#279, slice 2)."

[lib]
name = "shrike_kernel"

# Pure Rust — NO pyo3 anywhere in this dep tree (epic #265 convention 5; the
# layering check + the no-CPython smoke test below are the proof). This crate
# IS the embedded host #224 specs. It owns NO threads and assumes NO runtime
# (#308/#310): serialization is injected via SerialExecutor, and every op is
# an async fn the harness drives on its runtime of choice.
# Since #342 the kernel names NO engine and has NO features: the engine
# contract lives in shrike-engine-api, and hosts attach whatever engines the
# deployment composes (the layering check pins this structurally).
[dependencies]
shrike-collection = { path = "../shrike-collection" }
shrike-compute = { path = "../shrike-compute", default-features = false }
shrike-derived = { path = "../shrike-derived" }
shrike-engine-api = { path = "../shrike-engine-api" }
shrike-ffi = { workspace = true }
shrike-index = { path = "../shrike-index" }
shrike-schemas = { path = "../shrike-schemas" }
serde = "1"
serde_json = "1"
# Per-note change fingerprints — must hash byte-identically to Python's
# hashlib.blake2b(digest_size=8) so the on-disk sidecar survives the swap.
blake2 = "0.10"
tracing = "0.1"
# Runtime-AGNOSTIC async building blocks (#310): futures is the abstraction
# library, not a runtime — no tokio (or any executor) assumption in this crate.
# The harness picks the runtime; tests drive ops with futures::executor.
futures = { version = "0.3", features = ["executor"] }

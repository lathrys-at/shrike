[package]
name = "shrike-py"
version.workspace = true
edition.workspace = true
publish.workspace = true
license.workspace = true
description = "The Shrike PyO3 binding crate — the ONLY crate that sees pyo3 (#269)."

[lib]
# A Python extension module is a cdylib. Imported as `shrike_native._native`
# (the .so is renamed by the BUILD rule / build script), so the lib name here is
# free — kept descriptive.
name = "shrike_py"
crate-type = ["cdylib"]

[features]
# Forwarded to shrike-derived (#300): default = bundled SQLite (FTS5 + trigram
# guaranteed). Build with --no-default-features to link the platform SQLite.
default = ["bundled-sqlite", "anki-core"]
bundled-sqlite = ["shrike-derived/bundled"]
# The anki collection core binding (#278). DEFAULT ON since the cutover:
# CollectionWrapper runs on the native core, so every shrike_native build
# carries it (protoc required at build time; Bazel provides a hermetic one).
# Still a named feature so a compute-only embed/index build remains possible.
anki-core = ["dep:shrike-collection", "dep:shrike-kernel"]

[dependencies]
pyo3 = { workspace = true }
shrike-collection = { path = "../shrike-collection", optional = true }
shrike-kernel = { path = "../shrike-kernel", optional = true }
serde_json = "1"
# Runtime-agnostic future building blocks for the worker executor (no runtime).
futures = "0.3"
# Blocking Python backend calls ride the kernel runtime's blocking pool (#374 C).
tokio = { version = "1", features = ["rt"] }
shrike-compute = { path = "../shrike-compute" }
shrike-derived = { path = "../shrike-derived", default-features = false }
shrike-embed = { path = "../shrike-embed" }
shrike-embed-remote = { path = "../shrike-embed-remote" }
shrike-llama-server = { path = "../shrike-llama-server" }
# The engine contract (#342): the binding composes engines (WithPolicy +
# OnExecutor over the asyncio lane) into the kernel's Arc<dyn Embedder> slot.
shrike-engine-api = { path = "../shrike-engine-api" }
shrike-ffi = { workspace = true }
# The Apple Vision OCR engine (#342 P3) — attached native, like the embedders.
shrike-recognize-apple = { path = "../shrike-recognize-apple" }
shrike-index = { path = "../shrike-index" }
shrike-schemas = { path = "../shrike-schemas" }
# First-class observability bridges (#310): pyo3-log forwards `log` records to
# Python's stdlib `logging`; tracing's `log-always` compat feature makes every
# native tracing event emit such a record even with a tracing subscriber set
# (the ErrorLayer registry stays installed for NativeError span traces).
# Feature unification applies `log-always` to every tracing emitter in this
# build graph, so no compute crate needs its own bridge code.
pyo3-log = "0.13"
tracing = { version = "0.1", features = ["log-always"] }
tracing-error = "0.2"
tracing-subscriber = { version = "0.3", default-features = false, features = ["registry"] }

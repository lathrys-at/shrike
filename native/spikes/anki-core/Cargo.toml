# The #277 stretch spike: consume the anki Rust core (rslib) as an external
# git dependency at the tag matching the pinned pip wheel. NOT a workspace
# member (see [workspace] below + the exclude in native/Cargo.toml): it pulls
# the whole anki dependency tree and needs protoc on the build host, so it
# builds only when run explicitly:
#
#   cd native/spikes/anki-core && cargo run
#
# Verdict + findings recorded on the issue.
[package]
name = "anki-core-spike"
version = "0.0.0"
edition = "2021"
publish = false

[workspace]

[dependencies]
anki = { git = "https://github.com/ankitects/anki", tag = "25.09.4", package = "anki" }
anki_proto = { git = "https://github.com/ankitects/anki", tag = "25.09.4", package = "anki_proto" }
anyhow = "1"
# rslib relies on the anki workspace's feature unification: sibling crates
# enable tokio's io-util/etc., which an external consumer must re-enable.
tokio = { version = "1", features = ["full"] }

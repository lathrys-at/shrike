# The Apple Vision OCR engine (#342 P3, Swift glue since #398): a
# per-concern engine crate behind the shrike-engine-api traits. macOS-only
# innards — the platform API glue is Swift (Apple's new Vision API is
# Swift-only), compiled by build.rs into a static lib behind a 3-function
# C ABI. Off macOS both the [target] block and build.rs contribute nothing
# and the crate compiles to a stub whose constructor returns `unavailable`,
# so the workspace builds everywhere. Building on macOS requires full Xcode
# (the Swift Vision module isn't in the Command Line Tools); running needs
# nothing extra.
[package]
name = "shrike-recognize-apple"
version = "0.1.0"
edition = "2021"
license = "AGPL-3.0-or-later"
build = "build.rs"

[dependencies]
shrike-engine-api = { path = "../shrike-engine-api" }
shrike-ffi = { workspace = true }
tracing = "0.1"

# The Swift wire: JSON across the C boundary, parsed straight into the
# engine-api types (which already derive serde).
[target.'cfg(target_os = "macos")'.dependencies]
serde = { version = "1", features = ["derive"] }
serde_json = "1"

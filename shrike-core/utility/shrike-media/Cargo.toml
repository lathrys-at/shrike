# The inbound/untrusted-media crate (#711, epic #703): the "acquire + validate
# untrusted bytes" half cracked out of shrike-kernel's media_fetch. The
# SSRF-guarded URL fetch, the base64 decode + size cap, the per-item prepare,
# the basename-sanitizer, and the one extension<->MIME home the store half
# reads. A layer-FLOOR crate: it may depend on shrike-network (the SSRF
# primitives) + shrike-error + shrike-schemas, but NOT the kernel or any engine
# (enforced by //shrike-core:layering_check). Worth its own crate for the
# security-review boundary.
[package]
name = "shrike-media"
version = "0.1.0"
edition = "2021"
license = "AGPL-3.0-or-later"

[dependencies]
shrike-error = { workspace = true }
shrike-network = { workspace = true }
shrike-schemas = { path = "../../contracts/shrike-schemas" }
# ureq is a synchronous client (no tokio, no owned threads — the #308
# constraint); base64 decodes the data-source path; url parses + re-vets each
# redirect hop.
ureq = "2"
base64 = "0.22"
url = "2"

# Plain-cargo builds of the PyO3 cdylibs on macOS: leave Python symbols
# undefined at link time (the host interpreter resolves them at import) —
# the same flags the Bazel rust_shared_library rules pass via rustc_flags.
# Bazel ignores this file; it exists for local `cargo build/test`.
#
# The /usr/lib/swift rpath (#398): libswift_Concurrency's SDK stub remaps to
# an @rpath install name when the final link's deployment target is ≤ 12.0
# (the `$ld$previous` back-deploy window) — and rustc links at its 11.0
# default. The rpath resolves it from the OS shared cache wherever the Swift
# glue (shrike-recognize-apple) is linked in, and is inert everywhere else.
# Bazel-side the same flag rides the swift_glue cc_library's linkopts.
[target.aarch64-apple-darwin]
rustflags = [
    "-C", "link-arg=-undefined",
    "-C", "link-arg=dynamic_lookup",
    "-C", "link-arg=-Wl,-rpath,/usr/lib/swift",
]

[target.x86_64-apple-darwin]
rustflags = [
    "-C", "link-arg=-undefined",
    "-C", "link-arg=dynamic_lookup",
    "-C", "link-arg=-Wl,-rpath,/usr/lib/swift",
]

# Keep ALL local cargo scratch — test temp dirs (the many `std::env::temp_dir()`
# call sites in #[cfg(test)] code), plus rustc/rustdoc/linker/build-script temp —
# under the workspace, never the host temp dir. So `cargo test`/`cargo build`
# stops accumulating in /tmp (or, on macOS, /var/folders). `force = true`
# overrides the inherited TMPDIR; the target `<repo>/.cache/cargo-tmp` is a
# committed (empty) dir so it exists before the first rustc/rustdoc temp write.
# Resolves relative to this file's parent (shrike-core/), hence `../`. Bazel
# ignores this file and sandboxes TMPDIR (TEST_TMPDIR) itself, so this is the
# cargo lane only.
[env]
TMPDIR = { value = "../.cache/cargo-tmp", relative = true, force = true }

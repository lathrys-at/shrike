[package]
name = "shrike-engine"
version.workspace = true
edition.workspace = true
publish.workspace = true
license.workspace = true
description = "Every engine-contract implementation, feature-gated by family (#708): onnx (ort) + remote (HTTP) + apple (platform recognizers)."

[lib]
name = "shrike_engine"

# Engine families behind features (#708): a build pulls only the engines it
# composes. The GPU execution providers are additive sub-features of `onnx`
# (#384), each implying `onnx` — the server profile keeps the full onnx set; a
# slim build drops the GPU EP glue via `default-features = false`. CoreML stays
# in the base onnx set: it's the macOS path, wanted on exactly the slim targets.
[features]
default = ["onnx", "remote", "cuda", "tensorrt", "directml"]
# ── onnx (the in-process ort engines: text + CLIP) ───────────────────────────
onnx = ["dep:ort", "dep:tokenizers", "dep:ndarray", "dep:shrike-image"]
cuda = ["onnx", "ort/cuda"]
tensorrt = ["onnx", "ort/tensorrt"]
directml = ["onnx", "ort/directml"]
# ── remote (OpenAI-compatible HTTP: embeddings + VLM describe) ────────────────
remote = [
    "dep:shrike-network",
    "dep:reqwest",
    "dep:tokio",
    "dep:futures",
    "dep:url",
    "dep:base64",
]
# ── apple (platform recognizers over shrike-platform's Swift/C-ABI glue) ──────
engine-apple = ["dep:shrike-platform", "shrike-platform/engine-apple"]
# ── synthetic (deterministic, dependency-free embedder for benchmarks/tests) ──
# Pure Rust, no deps. Non-default: only a dev/test/benchmark build compiles it,
# so it is absent from `build_features()` in a release build and the host's
# capability resolution refuses a config that names it.
engine-synthetic = []

# Pure Rust — NO pyo3 (epic #265 convention 5); bound to Python in shrike-pyo3.
[dependencies]
shrike-error = { workspace = true }
# The engine contract (#342): this crate implements the sync compute traits
# (EmbedText/EmbedImages/RecognizeMedia) in-crate; hosts wrap them in an adapter
# at attach. The kernel↔ort firewall stays a separate thin crate — NOT folded.
shrike-engine-api = { path = "../../contracts/shrike-engine-api" }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
tracing = "0.1"

# ── onnx deps (optional; pulled by feature `onnx`) ────────────────────────────
# load-dynamic (no download-binaries): the onnxruntime shared library is dlopened
# at runtime from the *pinned onnxruntime Python wheel* the Python backend already
# installs (decision recorded in README.md + #269) — no duplicated runtime,
# guaranteed version match for the Phase-1 parity bake.
# Exact rc pin (like usearch's =2.25.3): rc-to-rc churn in ort's EP API is real
# (the ep::CoreML builder shape has changed across rcs).
ort = { version = "=2.0.0-rc.12", default-features = false, features = ["load-dynamic", "ndarray", "std", "api-24", "coreml"], optional = true }
# The same Rust crate the Python `tokenizers` package wraps — tokenization parity
# is structural. onig matches the python wheel's regex engine.
tokenizers = { version = "0.23", default-features = false, features = ["onig"], optional = true }
ndarray = { version = "0.17", optional = true }
# The CLIP byte->pixels->CHW pipeline (#707) — decode/resize/crop + the
# accelerated normalize (the default `accel` feature) behind a clean API.
shrike-image = { workspace = true, optional = true }

# ── remote deps (optional; pulled by feature `remote`) ────────────────────────
# Shared SSRF-safety primitives (#592) + the centralized async re-vet loops
# (#721 S2): pin the configured endpoint's IP and refuse cross-host redirects via
# the SAME control as the kernel's media fetch (post_pinned_with_revet). A LOW
# utility crate (no engine/kernel dep), so this stays pure.
shrike-network = { workspace = true, optional = true }
# ASYNC client (#721 S2 — route 2): the engines implement engine-api's async
# traits directly and the kernel awaits them on its runtime. reqwest is built by
# shrike-network's pinned-endpoint builder; this crate uses its header/Response
# types. default-features = false matches shrike-network (rustls-tls only, no
# native-tls); json for the request body, the rest of the transport rides the
# pinned client shrike-network hands back.
reqwest = { version = "0.12", default-features = false, features = [
    "rustls-tls",
    "json",
], optional = true }
# The bounded-retry backoff is `tokio::time::sleep` (no parked thread); the test
# tier uses the macro/rt to drive the async engines.
tokio = { version = "1", features = ["time"], optional = true }
# BoxFuture for the async-trait impls (Embedder/ImageEmbedder/Recognizer return
# `BoxFuture`, the engine-api convention — no async-trait crate).
futures = { version = "0.3", default-features = false, optional = true }
# Parse the configured base_url to pin its host + compare redirect targets.
url = { version = "2", optional = true }
# Media payloads for llama.cpp's native multimodal /embeddings dialect (#501)
# and chat-completions images ride as base64 strings.
base64 = { version = "0.22", optional = true }

# ── apple deps (optional; pulled by feature `engine-apple`) ───────────────────
# The raw Swift/C-ABI recognizer glue (#709). GLUE ONLY — it knows no engine
# contract; this crate parses its raw JSON into engine-api types.
shrike-platform = { path = "../../engines/shrike-platform", optional = true }

[dev-dependencies]
proptest = { workspace = true }
# The remote engines are async now (#721 S2 — route 2); their tests are
# `#[tokio::test]` driving the canned blocking test server, so the test tier
# needs the macros + a multi-thread runtime (the server thread blocks on accept
# while the test awaits the client).
tokio = { version = "1", features = ["macros", "rt-multi-thread", "time"] }
